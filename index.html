<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pure · run → hide editor</title>
    <!-- Bootstrap Icons (lightweight) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- ACE Editor core + autocomplete -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ext-language_tools.js"></script>
    <!-- Skulpt (python) & SQL.js & Babel for React -->
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #e6edf3;
            overflow: hidden;
        }
        /* title bar – minimal */
        .titlebar {
            background: #161b22;
            padding: 0.4rem 1rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            border-bottom: 1px solid #30363d;
            font-size: 0.9rem;
        }
        .titlebar .brand {
            font-weight: 600;
            color: #f0f6fc;
            letter-spacing: 0.3px;
        }
        .titlebar .brand i { color: #2f81f7; margin-right: 6px; }
        .titlebar button {
            background: transparent;
            border: none;
            color: #e6edf3;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.3rem 0.9rem;
            border-radius: 6px;
            font-size: 0.85rem;
            transition: 0.1s;
            cursor: pointer;
        }
        .titlebar button:hover { background: #30363d; }
        .titlebar .run-btn {
            background: #238636;
            color: white;
            margin-left: auto;
        }
        .titlebar .run-btn:hover { background: #2ea043; }

        /* MAIN LAYOUT – two states: editor-visible / output-only */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        /* SIDEBAR (file tree) – always visible (but can be narrow) */
        .file-sidebar {
            width: 240px;
            background: #0d1117;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            font-size: 0.9rem;
            transition: width 0.2s;
        }
        .sidebar-header {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #30363d;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #7d8590;
        }
        .sidebar-header i { cursor: pointer; padding: 4px; border-radius: 4px; }
        .sidebar-header i:hover { background: #30363d; color: white; }
        #fileTree {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0.5rem 0;
        }
        .tree-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px 4px 16px;
            cursor: pointer;
            border-radius: 0 6px 6px 0;
            margin-right: 4px;
            white-space: nowrap;
        }
        .tree-item:hover { background: #30363d; }
        .tree-item.selected { background: #1f6feb; color: white; }
        .tree-item i { width: 18px; font-size: 0.95rem; color: #8b949e; }
        .tree-item.selected i { color: white; }
        .folder-chevron { font-size: 0.7rem; margin-right: 2px; }
        .tree-children { display: none; padding-left: 1.2rem; }
        .tree-children.open { display: block; }

        /* EDITOR ZONE */
        .editor-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d1117;
            transition: opacity 0.15s;
        }
        .tabs-row {
            display: flex;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            overflow-x: auto;
            height: 36px;
        }
        .tab {
            background: #21262d;
            color: #b1bac4;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            border-right: 1px solid #30363d;
            cursor: pointer;
            min-width: 100px;
            max-width: 140px;
        }
        .tab.active {
            background: #0d1117;
            color: #f0f6fc;
            border-bottom: 2px solid #1f6feb;
        }
        .tab .close-tab {
            margin-left: auto;
            font-size: 1.1rem;
            opacity: 0.5;
        }
        .tab .close-tab:hover { opacity: 1; color: #f85149; }
        #editor { flex: 1; width: 100%; font-size: 14px; }

        /* OUTPUT PANEL – takes full space when editor is hidden */
        .output-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d1117;
        }
        .output-header {
            background: #161b22;
            padding: 0.3rem 1rem;
            border-bottom: 1px solid #30363d;
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
        }
        .output-header span { 
            cursor: pointer; 
            padding: 4px 0; 
            color: #8b949e;
            border-bottom: 2px solid transparent;
        }
        .output-header .active-tab {
            color: #f0f6fc;
            border-bottom: 2px solid #1f6feb;
        }
        .terminal {
            flex: 1;
            background: #0d1117;
            color: #e6edf3;
            font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
            padding: 1rem;
            overflow-y: auto;
            font-size: 0.9rem;
            white-space: pre-wrap;
        }
        .terminal .err { color: #f85149; }
        .terminal .info { color: #7ee227; }
        iframe { width: 100%; height: 100%; background: white; border: none; }

        /* hidden class – toggled by run */
        .hidden { display: none !important; }

        /* context menu (simple) */
        .context-menu {
            position: fixed;
            background: #21262d;
            border: 1px solid #454c54;
            border-radius: 6px;
            padding: 0.3rem 0;
            display: none;
            z-index: 1000;
        }
        .context-item {
            padding: 0.4rem 1.5rem;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .context-item:hover { background: #1f6feb; color: white; }
        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            place-items: center;
            z-index: 2000;
        }
        .modal {
            background: #161b22;
            padding: 1.5rem;
            border-radius: 8px;
            width: 360px;
            border: 1px solid #3d444d;
        }
        .modal input {
            width: 100%;
            background: #0d1117;
            border: 1px solid #3d444d;
            padding: 0.6rem;
            color: white;
            margin: 1rem 0;
            border-radius: 4px;
        }
        .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
        .modal-actions button {
            padding: 0.4rem 1.2rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-primary { background: #238636; color: white; }
        .btn-primary:hover { background: #2ea043; }
    </style>
</head>
<body>
    <div class="titlebar">
        <div class="brand"><i class="bi bi-terminal-plus"></i> pure·ide</div>
        <button onclick="ui.createNewFile()"><i class="bi bi-file-earmark-plus"></i> new file</button>
        <button onclick="ui.createNewFolder()"><i class="bi bi-folder-plus"></i> new folder</button>
        <button class="run-btn" id="runButton" onclick="runner.runAndHideEditor()"><i class="bi bi-play-fill"></i> run → replace editor</button>
    </div>

    <!-- WORKSPACE: sidebar + dynamic main area -->
    <div class="workspace">
        <!-- file tree sidebar -->
        <div class="file-sidebar">
            <div class="sidebar-header">
                <span>EXPLORER</span>
                <i class="bi bi-arrow-repeat" onclick="ui.refreshTree()"></i>
            </div>
            <ul id="fileTree"></ul>
        </div>

        <!-- MAIN CONTAINER (editor + output live here) -->
        <div id="mainDynamicArea" style="flex:1; display: flex;">
            <!-- EDITOR ZONE (visible by default) -->
            <div id="editorZone" class="editor-zone">
                <div class="tabs-row" id="tabsContainer"></div>
                <div id="editor"></div>
            </div>
            <!-- OUTPUT ZONE (hidden by default) -->
            <div id="outputZone" class="output-panel hidden">
                <div class="output-header">
                    <span id="terminalTabBtn" class="active-tab" onclick="ui.switchOutputTab('terminal')">terminal</span>
                    <span id="previewTabBtn" onclick="ui.switchOutputTab('preview')">web preview</span>
                </div>
                <div id="terminalPanel" class="terminal">ready · click run → editor hides, output shows</div>
                <iframe id="previewPanel" style="display: none;"></iframe>
            </div>
        </div>
    </div>

    <!-- context menu & modal (same as original but minimal) -->
    <div id="contextMenu" class="context-menu">
        <div class="context-item" onclick="ui.createNewFile()"><i class="bi bi-file-earmark"></i> new file</div>
        <div class="context-item" onclick="ui.createNewFolder()"><i class="bi bi-folder-plus"></i> new folder</div>
        <div class="context-item" onclick="ui.renameItem()"><i class="bi bi-pencil"></i> rename</div>
        <div class="context-item" style="color:#f85149;" onclick="ui.deleteItem()"><i class="bi bi-trash3"></i> delete</div>
    </div>
    <div class="modal-bg" id="inputModal">
        <div class="modal">
            <h5 id="modalTitle">New file</h5>
            <input type="text" id="modalInput" placeholder="name.ext">
            <div class="modal-actions">
                <button onclick="ui.closeModal()">cancel</button>
                <button class="btn-primary" onclick="ui.modalConfirm()">ok</button>
            </div>
        </div>
    </div>

    <script>
        // ---------- VIRTUAL FS ----------
        const fs = {
            structure: {
                'index.html': { type: 'file', content: '<!DOCTYPE html>\n<html>\n<head><link rel="stylesheet" href="style.css"></head>\n<body>\n  <h1>hello world</h1>\n  <button onclick="app.hello()">click</button>\n  <script src="script.js"><\/script>\n</body>\n</html>' },
                'style.css': { type: 'file', content: 'body { background: #0d1117; color: #c9d1d9; } button { background: #238636; }' },
                'script.js': { type: 'file', content: 'const app = { hello: () => alert("from js!") };\nconsole.log("ready");' },
                'main.py': { type: 'file', content: 'print("hello from python")\nfor i in range(3): print(i)' },
                'App.jsx': { type: 'file', content: 'function App() { const [c, setC] = React.useState(0); return <div><h1>react {c}</h1><button onClick={()=>setC(c+1)}>inc</button></div>; }\nReactDOM.render(<App />, document.getElementById("root"));' },
                'data.sql': { type: 'file', content: 'CREATE TABLE users(name TEXT);\nINSERT INTO users VALUES ("alice"), ("bob");\nSELECT * FROM users;' },
                'lib': { type: 'folder', children: {} }
            },
            getNode(pathArr) {
                let cur = this.structure;
                for (let i = 0; i < pathArr.length; i++) {
                    if (!cur[pathArr[i]]) return null;
                    if (i === pathArr.length - 1) return cur[pathArr[i]];
                    cur = cur[pathArr[i]].children;
                }
                return cur;
            },
            saveFile(pathStr, content) {
                const parts = pathStr.split('/');
                const name = parts.pop();
                let parent = this.structure;
                parts.forEach(p => parent = parent[p].children);
                if (parent[name]) parent[name].content = content;
            }
        };

        // ----- state -----
        const state = {
            openTabs: ['index.html'],    // default
            activeFile: 'index.html',
            db: null
        };

        let editor;
        window.onload = () => {
            editor = ace.edit('editor');
            editor.setTheme('ace/theme/tomorrow_night');
            editor.session.setMode('ace/mode/html');
            ace.require('ace/ext/language_tools');
            editor.setOptions({
                enableBasicAutocompletion: true,
                enableLiveAutocompletion: true,
                fontSize: '14px'
            });
            ui.refreshTree();
            ui.openFile('index.html', 'index.html');  // load initial
        };

        // ----- UI helper object -----
        const ui = {
            refreshTree() {
                const container = document.getElementById('fileTree');
                container.innerHTML = '';
                this.renderLevel(fs.structure, container, '');
            },
            renderLevel(node, parentEl, pathPrefix) {
                Object.keys(node).sort((a,b) => {
                    if (node[a].type !== node[b].type) return node[a].type === 'folder' ? -1 : 1;
                    return a.localeCompare(b);
                }).forEach(name => {
                    const item = node[name];
                    const fullPath = pathPrefix ? pathPrefix + '/' + name : name;
                    const li = document.createElement('li');
                    if (item.type === 'folder') {
                        li.innerHTML = `<div class="tree-item" data-path="${fullPath}" data-type="folder" style="padding-left: ${pathPrefix.split('/').filter(Boolean).length * 14}px">
                            <i class="bi bi-chevron-down folder-chevron"></i>
                            <i class="bi bi-folder-fill" style="color:#7d8590;"></i> ${name}
                        </div><ul class="tree-children open" data-parent="${fullPath}"></ul>`;
                        const childUl = li.querySelector('ul');
                        this.renderLevel(item.children, childUl, fullPath);
                        const div = li.querySelector('.tree-item');
                        div.onclick = (e) => {
                            e.stopPropagation();
                            const chev = div.querySelector('.bi-chevron-down');
                            childUl.classList.toggle('open');
                            chev.style.transform = childUl.classList.contains('open') ? 'rotate(0deg)' : 'rotate(-90deg)';
                        };
                    } else {
                        li.innerHTML = `<div class="tree-item" data-path="${fullPath}" data-type="file" style="padding-left: ${pathPrefix.split('/').filter(Boolean).length * 14 + 20}px">
                            <i class="${this.iconFor(name)}"></i> ${name}
                        </div>`;
                        li.querySelector('.tree-item').onclick = () => this.openFile(fullPath, name);
                    }
                    li.querySelector('.tree-item').oncontextmenu = (e) => {
                        e.preventDefault();
                        this.showContextMenu(e, fullPath, item.type);
                    };
                    parentEl.appendChild(li);
                });
            },
            iconFor(name) {
                if (name.endsWith('.html')) return 'bi bi-filetype-html';
                if (name.endsWith('.css')) return 'bi bi-filetype-css';
                if (name.endsWith('.js')) return 'bi bi-filetype-js';
                if (name.endsWith('.jsx')) return 'bi bi-filetype-jsx';
                if (name.endsWith('.py')) return 'bi bi-filetype-py';
                if (name.endsWith('.sql')) return 'bi bi-database';
                return 'bi bi-file-earmark';
            },
            openFile(path, name) {
                if (!state.openTabs.includes(path)) state.openTabs.push(path);
                state.activeFile = path;
                const node = fs.getNode(path.split('/'));
                if (node) {
                    editor.setValue(node.content, -1);
                    editor.session.setMode(this.aceMode(name));
                    this.highlightActive(path);
                    this.refreshTabs();
                }
            },
            aceMode(name) {
                const ext = name.split('.').pop();
                return { html:'ace/mode/html', css:'ace/mode/css', js:'ace/mode/javascript', jsx:'ace/mode/jsx', py:'ace/mode/python', sql:'ace/mode/sql' }[ext] || 'ace/mode/text';
            },
            refreshTabs() {
                const cont = document.getElementById('tabsContainer');
                cont.innerHTML = '';
                state.openTabs.forEach(p => {
                    const name = p.split('/').pop();
                    const active = p === state.activeFile ? 'active' : '';
                    const tab = document.createElement('div');
                    tab.className = `tab ${active}`;
                    tab.innerHTML = `${name} <span class="close-tab" onclick="event.stopPropagation(); ui.closeTab('${p}')">&times;</span>`;
                    tab.onclick = () => this.openFile(p, name);
                    cont.appendChild(tab);
                });
            },
            closeTab(path) {
                state.openTabs = state.openTabs.filter(p => p !== path);
                if (state.activeFile === path) {
                    state.activeFile = state.openTabs[0] || null;
                    if (state.activeFile) {
                        const node = fs.getNode(state.activeFile.split('/'));
                        editor.setValue(node.content, -1);
                    } else editor.setValue('');
                }
                this.refreshTabs();
            },
            highlightActive(path) {
                document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('selected'));
                const sel = document.querySelector(`.tree-item[data-path="${path}"]`);
                if (sel) sel.classList.add('selected');
            },
            showContextMenu(e, path, type) {
                const menu = document.getElementById('contextMenu');
                menu.style.left = e.pageX + 'px';
                menu.style.top = e.pageY + 'px';
                menu.style.display = 'block';
                menu.dataset.path = path;
                menu.dataset.type = type;
            },
            createNewFile() { this.modalPurpose = 'file'; this.openModal('new file', 'filename.ext'); },
            createNewFolder() { this.modalPurpose = 'folder'; this.openModal('new folder', 'folder name'); },
            renameItem() {
                this.modalPurpose = 'rename';
                const oldPath = document.getElementById('contextMenu').dataset.path;
                if (!oldPath) return;
                this.renameOldPath = oldPath;
                this.openModal('rename', oldPath.split('/').pop());
            },
            deleteItem() {
                const path = document.getElementById('contextMenu').dataset.path;
                if (!path || !confirm(`delete ${path}?`)) return;
                const parts = path.split('/');
                const name = parts.pop();
                let parent = fs.structure;
                parts.forEach(p => parent = parent[p].children);
                delete parent[name];
                if (state.openTabs.includes(path)) this.closeTab(path);
                this.refreshTree();
            },
            modalConfirm() {
                const val = document.getElementById('modalInput').value.trim();
                if (!val) return;
                const ctxPath = document.getElementById('contextMenu').dataset.path;
                const ctxType = document.getElementById('contextMenu').dataset.type;

                if (this.modalPurpose === 'file' || this.modalPurpose === 'folder') {
                    let target = fs.structure;
                    if (ctxPath) {
                        if (ctxType === 'folder') target = fs.getNode(ctxPath.split('/')).children;
                        else {
                            const p = ctxPath.split('/');
                            p.pop();
                            if (p.length) target = fs.getNode(p).children;
                        }
                    }
                    target[val] = this.modalPurpose === 'file' ? { type:'file', content:'' } : { type:'folder', children:{} };
                } else if (this.modalPurpose === 'rename') {
                    const old = this.renameOldPath;
                    const parts = old.split('/');
                    const oldName = parts.pop();
                    let parent = fs.structure;
                    parts.forEach(p => parent = parent[p].children);
                    parent[val] = parent[oldName];
                    delete parent[oldName];
                    const newPath = parts.concat([val]).join('/');
                    if (state.openTabs.includes(old)) {
                        state.openTabs = state.openTabs.map(p => p === old ? newPath : p);
                        if (state.activeFile === old) state.activeFile = newPath;
                    }
                }
                this.refreshTree();
                this.closeModal();
            },
            openModal(title, placeholder) {
                document.getElementById('modalTitle').innerText = title;
                document.getElementById('modalInput').placeholder = placeholder;
                document.getElementById('modalInput').value = '';
                document.getElementById('inputModal').style.display = 'flex';
                document.getElementById('contextMenu').style.display = 'none';
            },
            closeModal() { document.getElementById('inputModal').style.display = 'none'; },
            switchOutputTab(tab) {
                const term = document.getElementById('terminalPanel');
                const prev = document.getElementById('previewPanel');
                if (tab === 'terminal') {
                    term.style.display = 'block';
                    prev.style.display = 'none';
                    document.getElementById('terminalTabBtn').classList.add('active-tab');
                    document.getElementById('previewTabBtn').classList.remove('active-tab');
                } else {
                    term.style.display = 'none';
                    prev.style.display = 'flex';
                    document.getElementById('previewTabBtn').classList.add('active-tab');
                    document.getElementById('terminalTabBtn').classList.remove('active-tab');
                }
            }
        };

        // ----- runner: implements hide editor + show output -----
        const runner = {
            async runAndHideEditor() {
                // save current file content
                if (state.activeFile) {
                    fs.saveFile(state.activeFile, editor.getValue());
                }
                // hide editor zone, show output zone
                document.getElementById('editorZone').classList.add('hidden');
                document.getElementById('outputZone').classList.remove('hidden');
                // run logic based on active file
                if (!state.activeFile) {
                    this.log('no file open', false, true);
                    return;
                }
                const ext = state.activeFile.split('.').pop();
                const node = fs.getNode(state.activeFile.split('/'));
                if (!node) return;

                // clear terminal
                document.getElementById('terminalPanel').innerHTML = '';
                ui.switchOutputTab('terminal');   // default to terminal

                if (ext === 'html' || ext === 'css' || ext === 'js') this.runWeb();
                else if (ext === 'jsx') this.runReact();
                else if (ext === 'py') this.runPython(node.content);
                else if (ext === 'sql') await this.runSQL(node.content);
                else this.log('cannot run this file type', true);
            },

            runWeb() {
                let htmlPath = state.activeFile;
                if (!htmlPath.endsWith('.html')) htmlPath = 'index.html';
                const node = fs.getNode(htmlPath.split('/'));
                if (!node) { this.log('index.html missing', true); return; }
                let html = node.content;
                // inject linked css/js (basic)
                html = html.replace(/<link[^>]*href=["']([\w\.\/]+\.css)["'][^>]*>/gi, (match, p1) => {
                    const cssNode = fs.getNode(p1.split('/'));
                    return cssNode ? `<style>/* ${p1} */\n${cssNode.content}</style>` : match;
                });
                html = html.replace(/<script[^>]*src=["']([\w\.\/]+\.js)["'][^>]*><\/script>/gi, (match, p1) => {
                    const jsNode = fs.getNode(p1.split('/'));
                    return jsNode ? `<script>/* ${p1} */\n${jsNode.content}<\/script>` : match;
                });
                document.getElementById('previewPanel').srcdoc = html;
                ui.switchOutputTab('preview');
            },

            runReact() {
                const node = fs.getNode(state.activeFile.split('/'));
                const jsx = node.content;
                const doc = `
                    <div id="root"></div>
                    <script src="https://unpkg.com/react@18/umd/react.development.js"><\/script>
                    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"><\/script>
                    <script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>
                    <script type="text/babel">${jsx}<\/script>
                `;
                document.getElementById('previewPanel').srcdoc = doc;
                ui.switchOutputTab('preview');
            },

            runPython(code) {
                Sk.configure({ output: t => this.log(t), read: (x) => { if (Sk.builtinFiles && Sk.builtinFiles.files[x]) return Sk.builtinFiles.files[x]; throw 'file not found'; }, __future__: Sk.python3 });
                Sk.misceval.asyncToPromise(() => Sk.importMainWithBody('<stdin>', false, code, true)).catch(e => this.log(e.toString(), true));
            },

            async runSQL(sql) {
                if (!state.db) {
                    const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${f}` });
                    state.db = new SQL.Database();
                }
                try {
                    const res = state.db.exec(sql);
                    if (!res.length) this.log('done (no rows)', false, true);
                    else {
                        res.forEach(r => {
                            let table = '<table border="1" style="border-collapse:collapse; margin:4px 0"><tr>' + r.columns.map(c => `<th>${c}</th>`).join('') + '</tr>';
                            r.values.forEach(v => table += '<tr>' + v.map(d => `<td>${d}</td>`).join('') + '</tr>');
                            table += '</table>';
                            document.getElementById('terminalPanel').innerHTML += table;
                        });
                    }
                } catch (e) { this.log('sql err: '+e.message, true); }
            },

            log(msg, isErr, isInfo) {
                const el = document.getElementById('terminalPanel');
                const d = document.createElement('div');
                d.innerText = msg;
                if (isErr) d.className = 'err';
                else if (isInfo) d.className = 'info';
                el.appendChild(d);
                el.scrollTop = el.scrollHeight;
            }
        };

        // run button also toggles if output is already visible? (we want editor hidden after run)
        // but we also need a way to get editor back: clicking a file in tree will unhide editor
        // override openFile to reveal editor when a file is clicked
        const originalOpen = ui.openFile;
        ui.openFile = function(path, name) {
            // show editor, hide output
            document.getElementById('editorZone').classList.remove('hidden');
            document.getElementById('outputZone').classList.add('hidden');
            originalOpen.call(this, path, name);
        };
        // also refreshTree binds items to ui.openFile, so it's automatically fixed

        document.addEventListener('click', () => document.getElementById('contextMenu').style.display = 'none');
    </script>
</body>
</html>
