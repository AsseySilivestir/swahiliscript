<!DOCTYPE html>
<html>
<head>
<title>C++ Browser Compiler</title>

<style>
body{
font-family:Arial;
background:#1e1e1e;
color:white;
padding:20px;
}

textarea{
width:100%;
height:250px;
background:#111;
color:#00ff88;
font-family:monospace;
padding:10px;
font-size:14px;
}

button{
margin-top:10px;
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#output{
margin-top:20px;
background:black;
padding:15px;
min-height:120px;
}
</style>

</head>

<body>

<h2>Browser C++ Compiler</h2>

<textarea id="code">
#include <iostream>

int main(){
    std::cout << "Hello from C++!";
    return 0;
}
</textarea>

<br>
<button onclick="run()">Run</button>

<div id="output"></div>

<script src="https://cdn.jsdelivr.net/gh/emscripten-core/emscripten@main/src/emrun_postjs.js"></script>

<script>

async function run(){

let code=document.getElementById("code").value
let output=document.getElementById("output")

output.innerText="Compiling..."

try{

let response=await fetch("https://wandbox.org/api/compile.json",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
compiler:"gcc-head",
code:code
})
})

let result=await response.json()

output.innerText=result.program_output || result.compiler_error

}catch(e){
output.innerText="Error: "+e
}

}

</script>

</body>
</html>
