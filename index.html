    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1e1e;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #e6edf3;
            overflow: hidden;
        }
        /* Titlebar */
        .titlebar {
            background: #2c2c2c;
            padding: 0.4rem 1rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            border-bottom: 1px solid #3c3c3c;
            font-size: 0.9rem;
        }
        .titlebar .brand { font-weight: 600; color: #fff; }
        .titlebar .brand i { color: #61dafb; margin-right: 6px; }
        .titlebar button {
            background: transparent;
            border: none;
            color: #ccc;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.3rem 0.9rem;
            border-radius: 6px;
            font-size: 0.85rem;
            transition: 0.1s;
            cursor: pointer;
        }
        .titlebar button:hover { background: #3c3c3c; color: white; }
        .titlebar .run-btn { background: #3ddc84; color: #1e1e1e; }
        .titlebar .run-btn:hover { background: #5fe0a0; }

        /* Main Layout */
        .workspace { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            background: #252526;
            border-right: 1px solid #3c3c3c;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 10px 16px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #aaa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3c3c3c;
        }
        .sidebar-header i { cursor: pointer; padding: 4px; border-radius: 4px; }
        .sidebar-header i:hover { background: #3c3c3c; }
        
        .file-tree { flex: 1; overflow-y: auto; padding: 8px 0; user-select: none; }
        
        .tree-item {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #ccc;
            transition: background 0.1s;
        }
        .tree-item:hover { background: #2a2d2e; }
        .tree-item.selected { background: #37373d; }
        .tree-item.drag-over { background: #3ddc8420; border: 1px dashed #3ddc84; }
        .tree-item .icon { margin-right: 6px; width: 16px; text-align: center; flex-shrink: 0; }
        .tree-item .name { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .folder-content { display: none; }
        .folder-content.open { display: block; }
        .folder-icon { color: #dcb67a; }
        
        /* File Icons */
        .file-icon { color: #8a8a8a; }
        .file-icon.html { color: #e34c26; }
        .file-icon.css { color: #264de4; }
        .file-icon.js { color: #f7df1e; }
        .file-icon.jsx { color: #61dafb; }
        .file-icon.py { color: #3572A5; }
        .file-icon.xml { color: #00b894; }
        .file-icon.sql { color: #e48e00; }
        .file-icon.ks { color: #ff6b6b; } /* Swahili color */

        /* Editor Zone */
        .editor-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
            min-width: 300px;
        }
        .tabs-row { display: flex; background: #252526; height: 36px; overflow-x: auto; }
        .tab {
            background: #2d2d2d;
            color: #888;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            border-right: 1px solid #1e1e1e;
            cursor: pointer;
            white-space: nowrap;
            height: 100%;
        }
        .tab.active { background: #1e1e1e; color: #fff; border-top: 2px solid #61dafb; }
        .tab .close-tab { font-size: 1rem; opacity: 0.5; margin-left: 6px; }
        .tab .close-tab:hover { opacity: 1; color: #f85149; }
        #editor { flex: 1; width: 100%; font-size: 14px; }

        /* Preview Panel */
        .design-panel {
            width: 40%;
            min-width: 320px;
            background: #2c2c2c;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #3c3c3c;
        }
        .design-header {
            background: #252526;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            align-items: center;
            color: #aaa;
            font-size: 0.85rem;
        }
        .visual-output {
            flex: 1;
            background: white;
            border: none;
            width: 100%;
            height: 100%;
        }
        .console-output {
            height: 180px;
            background: #1e1e1e;
            border-top: 2px solid #3c3c3c;
            padding: 10px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            color: #d4d4d4;
            overflow-y: auto;
            display: none;
        }
        .console-line { margin-bottom: 4px; }
        .console-log { color: #d4d4d4; }
        .console-error { color: #f48771; }
        .console-info { color: #6a9955; }
        /* SQL Table Styles */
        .sql-table { border-collapse: collapse; width: 100%; color: #333; font-family: sans-serif; font-size: 12px; margin-top: 5px; }
        .sql-table th, .sql-table td { border: 1px solid #ddd; padding: 4px 8px; text-align: left; }
        .sql-table th { background-color: #f2f2f2; font-weight: bold; }

        .status-line {
            background: #007acc;
            padding: 2px 12px;
            font-size: 0.8rem;
            color: #fff;
            border-top: 1px solid #3c3c3c;
            display: flex;
            justify-content: space-between;
        }

        /* Context Menu */
        .context-menu {
            position: fixed;
            background: #2c2c2c;
            border: 1px solid #454545;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 2000;
            min-width: 160px;
            padding: 4px 0;
            display: none;
        }
        .context-menu-item {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .context-menu-item:hover { background: #3ddc84; color: #1e1e1e; }
    </style>
</head>
<body>

    <div class="titlebar">
        <div class="brand"><i class="bi bi-code-slash"></i> Code Studio</div>
        <button class="run-btn" onclick="runner.runCurrentFile()"><i class="bi bi-play-fill"></i> Run</button>
    </div>

    <div class="workspace">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                Explorer
                <i class="bi bi-plus-square" title="New File" onclick="fileTree.createNewFile()"></i>
            </div>
            <div class="file-tree" id="fileTreeContainer"></div>
        </div>

        <!-- Editor -->
        <div id="editorZone" class="editor-zone">
            <div class="tabs-row" id="tabsContainer"></div>
            <div id="editor"></div>
            <div class="status-line">
                <span id="langStatus">Ready</span>
                <span id="statusMsg">Ctrl+S to save</span>
            </div>
        </div>

        <!-- Preview -->
        <div class="design-panel">
            <div class="design-header">
                <i class="bi bi-terminal" style="margin-right:8px;"></i> Output
            </div>
            <iframe id="previewFrame" class="visual-output" sandbox="allow-scripts allow-modals"></iframe>
            <div id="consoleOutput" class="console-output"></div>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="contextMenu" class="context-menu">
        <div class="context-menu-item" onclick="fileTree.handleContextAction('newFile')"><i class="bi bi-file-plus"></i> New File</div>
        <div class="context-menu-item" onclick="fileTree.handleContextAction('delete')"><i class="bi bi-trash"></i> Delete</div>
    </div>

    <script>
        // ---------- STATE & CONFIGURATION ----------
        let editor;
        const previewFrame = document.getElementById('previewFrame');
        const consoleElement = document.getElementById('consoleOutput');
        const contextMenu = document.getElementById('contextMenu');

        const uid = () => '_' + Math.random().toString(36).substr(2, 9);

        // Initial File System
        const fsData = {
            root: [
                {
                    id: uid(), type: 'folder', name: 'src', expanded: true,
                    children: [
                        { id: uid(), type: 'file', name: 'index.html', content: '<!DOCTYPE html>\n<html>\n<body>\n\t<h1>Hello World</h1>\n</body>\n</html>' },
                        { id: uid(), type: 'file', name: 'style.css', content: 'body {\n  background: #f0f0f0;\n  color: #333;\n}\nh1 {\n  border-bottom: 2px solid #333;\n}' },
                        { 
                            id: uid(), type: 'file', name: 'app.jsx', content: 
                            'function App() {\n\treturn <div style={{padding:20}}>\n\t\t<h1>React Component</h1>\n\t</div>;\n}\nReactDOM.render(<App />, document.getElementById("root"));' 
                        }
                    ]
                },
                {
                    id: uid(), type: 'folder', name: 'swahili', expanded: true,
                    children: [
                        { id: uid(), type: 'file', name: 'main.ks', content: "' Swahili Lang Demo\n$ jina = 'Code Studio';\n$ mwaka = 2024;\nandika 'Karibu ', jina;\nandika 'Mwaka: ', mwaka;" }
                    ]
                },
                {
                    id: uid(), type: 'folder', name: 'database', expanded: false,
                    children: [
                        { id: uid(), type: 'file', name: 'query.sql', content: '-- SQL Demo (AlaSQL)\nCREATE TABLE users (name STRING, age NUMBER);\nINSERT INTO users VALUES ("Alice", 25);\nINSERT INTO users VALUES ("Bob", 30);\nSELECT * FROM users WHERE age > 26;' }
                    ]
                },
                { id: uid(), type: 'file', name: 'layout.xml', content: '<?xml version="1.0" encoding="utf-8"?>\n<LinearLayout\n\txmlns:android="http://schemas.android.com/apk/res/android"\n\tandroid:orientation="vertical"\n\tandroid:layout_width="match_parent"\n\tandroid:layout_height="match_parent">\n\n\t<TextView android:text="Hello Android" android:textSize="20sp"/>\n\n</LinearLayout>' }
            ]
        };

        const openTabs = []; 
        let activeFileId = null;
        let draggedItem = null; 
        let contextTarget = null; 

        // ---------- FILE TREE MANAGER ----------
        const fileTree = {
            init() {
                this.render();
                const firstFile = this.findFirstFile(fsData.root);
                if(firstFile) this.openFile(firstFile.id);
            },

            findFirstFile(items) {
                for(let item of items) {
                    if(item.type === 'file') return item;
                    if(item.type === 'folder') {
                        const found = this.findFirstFile(item.children);
                        if(found) return found;
                    }
                }
                return null;
            },

            render() {
                const container = document.getElementById('fileTreeContainer');
                container.innerHTML = this.renderItems(fsData.root, 0);
                this.attachEvents();
            },

            renderItems(items, depth) {
                let html = '';
                items.forEach(item => {
                    const indent = depth * 16;
                    const isActive = item.id === activeFileId ? 'selected' : '';
                    
                    if(item.type === 'folder') {
                        const isOpen = item.expanded ? 'open' : '';
                        const icon = item.expanded ? 'bi-chevron-down' : 'bi-chevron-right';
                        html += `
                            <div class="tree-item" data-id="${item.id}" data-type="folder" style="padding-left:${indent+8}px" draggable="true">
                                <i class="bi ${icon}" style="font-size:10px; margin-right:4px;"></i>
                                <i class="bi bi-folder-fill folder-icon icon"></i>
                                <span class="name">${item.name}</span>
                            </div>
                            <div class="folder-content ${isOpen}" data-folder-id="${item.id}">
                                ${this.renderItems(item.children, depth + 1)}
                            </div>
                        `;
                    } else {
                        const ext = item.name.split('.').pop();
                        html += `
                            <div class="tree-item ${isActive}" data-id="${item.id}" data-type="file" style="padding-left:${indent+8}px" draggable="true">
                                <i class="bi bi-file-earmark file-icon ${ext} icon"></i>
                                <span class="name">${item.name}</span>
                            </div>
                        `;
                    }
                });
                return html;
            },

            attachEvents() {
                const items = document.querySelectorAll('.tree-item');
                items.forEach(el => {
                    el.onclick = (e) => {
                        e.stopPropagation();
                        const id = el.dataset.id;
                        const type = el.dataset.type;
                        if (type === 'folder') this.toggleFolder(id);
                        else this.openFile(id);
                    };

                    el.oncontextmenu = (e) => {
                        e.preventDefault();
                        contextTarget = el.dataset.id;
                        contextMenu.style.display = 'block';
                        contextMenu.style.left = e.clientX + 'px';
                        contextMenu.style.top = e.clientY + 'px';
                    };

                    el.ondragstart = (e) => {
                        draggedItem = el.dataset.id;
                        el.style.opacity = '0.5';
                    };
                    el.ondragend = () => {
                        el.style.opacity = '1';
                        draggedItem = null;
                    };

                    if(el.dataset.type === 'folder') {
                        el.ondragover = (e) => { e.preventDefault(); el.classList.add('drag-over'); };
                        el.ondragleave = () => el.classList.remove('drag-over');
                        el.ondrop = (e) => {
                            e.preventDefault();
                            el.classList.remove('drag-over');
                            if(draggedItem) this.moveItem(draggedItem, el.dataset.id);
                        };
                    }
                });
            },

            findItemAndParent(items, id, parent = null) {
                for(let i=0; i<items.length; i++) {
                    if(items[i].id === id) return { item: items[i], parent: parent, index: i, siblings: items };
                    if(items[i].type === 'folder') {
                        const found = this.findItemAndParent(items[i].children, id, items[i]);
                        if(found) return found;
                    }
                }
                return null;
            },

            toggleFolder(id) {
                const found = this.findItemAndParent(fsData.root, id);
                if(found && found.item.type === 'folder') {
                    found.item.expanded = !found.item.expanded;
                    this.render();
                }
            },

            moveItem(itemId, targetFolderId) {
                const source = this.findItemAndParent(fsData.root, itemId);
                const target = this.findItemAndParent(fsData.root, targetFolderId);
                if(!source || !target || target.item.type !== 'folder') return;
                
                source.siblings.splice(source.index, 1);
                target.item.children.push(source.item);
                target.item.expanded = true;
                this.render();
            },

            openFile(id) {
                const found = this.findItemAndParent(fsData.root, id);
                if(found && found.item.type === 'file') {
                    activeFileId = id;
                    if(!openTabs.includes(id)) openTabs.push(id);
                    
                    editor.setValue(found.item.content, -1);
                    
                    const ext = found.item.name.split('.').pop();
                    const modeMap = { 
                        'html': 'ace/mode/html', 
                        'css': 'ace/mode/css',
                        'js': 'ace/mode/javascript', 
                        'jsx': 'ace/mode/jsx', 
                        'py': 'ace/mode/python', 
                        'xml': 'ace/mode/xml',
                        'sql': 'ace/mode/sql',
                        'ks': 'ace/mode/javascript' // Swahili uses JS-like syntax highlighting
                    };
                    editor.session.setMode(modeMap[ext] || 'ace/mode/text');
                    document.getElementById('langStatus').innerText = ext.toUpperCase();
                    
                    this.render(); 
                    renderTabs();
                    runner.runCurrentFile();
                }
            },

            createNewFile(parentId = null) {
                let parent = parentId ? this.findItemAndParent(fsData.root, parentId).item : null;
                const name = prompt("Enter file name (e.g. script.js, style.css, main.ks):");
                if(!name) return;

                const isFolder = !name.includes('.'); 
                const newItem = {
                    id: uid(),
                    type: isFolder ? 'folder' : 'file',
                    name: name,
                    content: isFolder ? null : ''
                };
                if(isFolder) newItem.children = [];

                if(parentId && parent) {
                     parent.children.push(newItem);
                     parent.expanded = true;
                } else {
                     fsData.root.push(newItem);
                }
                
                this.render();
                if(!isFolder) this.openFile(newItem.id);
            },

            deleteItem(id) {
                if(!confirm("Delete this item?")) return;
                const found = this.findItemAndParent(fsData.root, id);
                if(found) {
                    found.siblings.splice(found.index, 1);
                    const tabIndex = openTabs.indexOf(id);
                    if(tabIndex > -1) openTabs.splice(tabIndex, 1);
                    if(activeFileId === id) {
                        activeFileId = null;
                        editor.setValue("", -1);
                        renderTabs();
                    }
                    this.render();
                }
            },

            handleContextAction(action) {
                contextMenu.style.display = 'none';
                if(!contextTarget) return;
                if(action === 'newFile') this.createNewFile(contextTarget);
                else if(action === 'delete') this.deleteItem(contextTarget);
            }
        };

        // ---------- TABS ----------
        function renderTabs() {
            const container = document.getElementById('tabsContainer');
            container.innerHTML = '';
            
            openTabs.forEach(id => {
                const found = fileTree.findItemAndParent(fsData.root, id);
                if(!found) return;
                
                const tab = document.createElement('div');
                tab.className = `tab ${id === activeFileId ? 'active' : ''}`;
                const ext = found.item.name.split('.').pop();
                const iconMap = { 
                    'html': 'bi-filetype-html', 'css': 'bi-filetype-css',
                    'js': 'bi-filetype-js', 'jsx': 'bi-filetype-jsx', 
                    'py': 'bi-filetype-py', 'xml': 'bi-file-earmark-code',
                    'sql': 'bi-database', 'ks': 'bi-file-earmark-code'
                };
                
                tab.innerHTML = `<i class="bi ${iconMap[ext] || 'bi-file-earmark'}"></i> ${found.item.name} <span class="close-tab">&times;</span>`;
                tab.onclick = (e) => {
                    if(e.target.classList.contains('close-tab')) {
                        openTabs.splice(openTabs.indexOf(id), 1);
                        if(activeFileId === id && openTabs.length > 0) fileTree.openFile(openTabs[openTabs.length-1]);
                        else if(openTabs.length === 0) { activeFileId = null; editor.setValue("", -1); }
                        renderTabs();
                        fileTree.render();
                    } else fileTree.openFile(id);
                };
                container.appendChild(tab);
            });
        }

        // ---------- RUNNER ----------
        const runner = {
            runCurrentFile() {
                if(!activeFileId) return;
                const found = fileTree.findItemAndParent(fsData.root, activeFileId);
                if(!found) return;
                
                found.item.content = editor.getValue(); // Save
                const file = found.item;
                const type = file.name.split('.').pop();
                
                consoleElement.style.display = 'none';
                previewFrame.style.display = 'block';
                consoleElement.innerHTML = '';
                
                const runners = {
                    'html': this.runHTML, 'css': this.runCSS,
                    'js': this.runJS, 'jsx': this.runReact,
                    'py': this.runPython, 'xml': this.runXML,
                    'sql': this.runSQL, 'ks': this.runSwahili
                };

                if(runners[type]) runners[type].call(this, file.content);
                else {
                    consoleElement.style.display = 'block';
                    this.log('info', `Unsupported file type: ${type}`);
                }
            },

            runHTML(code) {
                previewFrame.srcdoc = code;
            },

            runCSS(code) {
                // Live preview CSS
                const html = `<style>${code}</style>
                    <div class="preview-box">
                        <h1>CSS Preview</h1>
                        <p>This is a paragraph.</p>
                        <button>Button</button>
                    </div>`;
                previewFrame.srcdoc = html;
            },

            runJS(code) {
                consoleElement.style.display = 'block';
                previewFrame.style.display = 'none';
                this.log('info', '> Running JavaScript...');
                const customConsole = {
                    log: (...args) => this.log('log', args.map(a => this.stringify(a)).join(' ')),
                    error: (...args) => this.log('error', args.join(' '))
                };
                try { new Function('console', code)(customConsole); } 
                catch (e) { this.log('error', e.message); }
            },

            runReact(code) {
                const html = `<div id="root"></div>
                <script src="https://unpkg.com/react@18/umd/react.development.js"><\/script>
                <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"><\/script>
                <script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>
                <script type="text/babel">${code}<\/script>`;
                previewFrame.srcdoc = html;
            },

            runPython(code) {
                consoleElement.style.display = 'block';
                previewFrame.style.display = 'none';
                this.log('info', '> Running Python...');
                Sk.configure({ 
                    output: (t) => this.log('log', t.replace(/\n$/, "")), 
                    read: x => {
                        if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined) throw "File not found: '" + x + "'";
                        return Sk.builtinFiles["files"][x];
                    }
                });
                Sk.misceval.asyncToPromise(() => Sk.importMainWithBody("<stdin>", false, code, true))
                    .catch(e => this.log('error', e.toString()));
            },

            runSQL(code) {
                consoleElement.style.display = 'block';
                previewFrame.style.display = 'none';
                this.log('info', '> Running SQL...');
                try {
                    const res = alasql(code);
                    if(Array.isArray(res)) {
                        if(res.length === 0) this.log('log', 'Query returned 0 rows.');
                        else {
                            // Create HTML table
                            let html = `<table class="sql-table"><tr>`;
                            Object.keys(res[0]).forEach(k => html += `<th>${k}</th>`);
                            html += `</tr>`;
                            res.forEach(row => {
                                html += `<tr>`;
                                Object.values(row).forEach(v => html += `<td>${v}</td>`);
                                html += `</tr>`;
                            });
                            html += `</table>`;
                            
                            // Inject table into log
                            const div = document.createElement('div');
                            div.innerHTML = html;
                            consoleElement.appendChild(div);
                        }
                    } else {
                        this.log('log', 'Query executed successfully. Rows affected: ' + res);
                    }
                } catch(e) {
                    this.log('error', e.message);
                }
            },

            runSwahili(code) {
                consoleElement.style.display = 'block';
                previewFrame.style.display = 'none';
                this.log('info', '> Running Swahili (.ks)...');

                // Reset globalLog
                if(window.globalLog) window.globalLog.values = [];
                else window.globalLog = { values: [] };

                try {
                    if(typeof Interpreter === 'undefined') {
                        throw new Error("Swahili.js is not loaded. Ensure script is linked.");
                    }
                    new Interpreter(code);

                    window.globalLog.values.forEach(entry => {
                        if (entry.log !== undefined) this.log('log', entry.log);
                        if (entry.error) this.log('error', entry.error.message);
                    });
                } catch (e) {
                    this.log('error', e.message);
                }
            },

            runXML(code) {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(code, "text/xml");
                const errorNode = xmlDoc.querySelector('parsererror');
                if (errorNode) {
                    previewFrame.srcdoc = `<body style="background:#1e1e1e;color:#f85149;padding:20px;">XML Error:<br><pre>${errorNode.textContent}</pre></body>`;
                    return;
                }
                const styles = `body{margin:0;background:#1a1a1a;display:flex;justify-content:center;align-items:center;height:100vh}.device{width:360px;height:640px;background:#fff;border-radius:36px;overflow:hidden;box-shadow:0 15px 35px rgba(0,0,0,0.6);border:8px solid #333}.status-bar{background:#2196F3;padding:4px 16px;color:#fff;font-size:12px;display:flex;justify-content:space-between}.content{flex:1;background:#f5f5f5;padding:16px;overflow-y:auto}.widget{width:100%;margin-bottom:12px;box-sizing:border-box}.linear-layout{display:flex;flex-direction:column}.text-view{color:#333;font-size:14px}.button{background:#2196F3;color:#fff;padding:12px;border-radius:4px;text-align:center;font-weight:500}`;
                
                function parseNode(node) {
                    if (node.nodeType !== 1) return '';
                    let tag = node.tagName.toLowerCase();
                    let attrs = {};
                    for (let a of node.attributes) attrs[a.name] = a.value;
                    let style = '';
                    let childrenHtml = '';
                    for (let c of node.childNodes) childrenHtml += parseNode(c);

                    if (attrs['android:background']) style += `background:${attrs['android:background']};`;
                    if (attrs['android:textColor']) style += `color:${attrs['android:textColor']};`;
                    if (attrs['android:textSize']) style += `font-size:${attrs['android:textSize']};`;
                    if (attrs['android:layout_width'] === 'match_parent') style += `width:100%;`;

                    if (tag === 'linearlayout') {
                        let cls = 'widget linear-layout';
                        if (attrs['android:orientation'] === 'horizontal') cls += ' horizontal';
                        return `<div class="${cls}" style="${style}">${childrenHtml}</div>`;
                    } else if (tag === 'textview') {
                        return `<div class="widget text-view" style="${style}">${attrs['android:text'] || 'TextView'}</div>`;
                    } else if (tag === 'button') {
                        if (attrs['android:backgroundtint']) style += `background:${attrs['android:backgroundtint']};`;
                        return `<div class="widget button" style="${style}">${attrs['android:text'] || 'Button'}</div>`;
                    }
                    return childrenHtml;
                }
                const body = parseNode(xmlDoc.documentElement);
                previewFrame.srcdoc = `<html><head><style>${styles}</style></head><body><div class="device"><div class="status-bar"><span>10:25</span><span>Preview</span></div><div class="content">${body}</div></div></body></html>`;
            },

            log(type, msg) {
                const div = document.createElement('div');
                div.className = `console-line console-${type}`;
                div.innerText = msg;
                consoleElement.appendChild(div);
                consoleElement.scrollTop = consoleElement.scrollHeight;
            },
            stringify(obj) { try { return JSON.stringify(obj); } catch(e) { return String(obj); } }
        };

        // ---------- INIT ----------
        window.onload = () => {
            editor = ace.edit('editor');
            editor.setTheme('ace/theme/tomorrow_night');
            editor.setOptions({ enableBasicAutocompletion: true, enableLiveAutocompletion: true, fontSize: '14px' });
            
            fileTree.init();

            window.onclick = () => contextMenu.style.display = 'none';

            editor.session.on('change', () => {
                if(activeFileId) {
                    clearTimeout(window.saveTimer);
                    window.saveTimer = setTimeout(() => {
                        const found = fileTree.findItemAndParent(fsData.root, activeFileId);
                        if(found) found.item.content = editor.getValue();
                    }, 300);
                }
            });
        };

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                document.getElementById('statusMsg').innerText = "Saved";
                setTimeout(() => document.getElementById('statusMsg').innerText = "Ready", 1500);
            }
        });
    </script>
</body>
</html>
