<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Studio · live layout designer</title>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- ACE Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ext-language_tools.js"></script>
    <!-- XML → Android view simulation (uses simple html/css) -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1e1e;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #e6edf3;
            overflow: hidden;
        }
        .titlebar {
            background: #2c2c2c;
            padding: 0.4rem 1rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            border-bottom: 1px solid #3c3c3c;
            font-size: 0.9rem;
        }
        .titlebar .brand {
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.3px;
        }
        .titlebar .brand i { color: #3ddc84; margin-right: 6px; }  /* Android green */
        .titlebar button {
            background: transparent;
            border: none;
            color: #ccc;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.3rem 0.9rem;
            border-radius: 6px;
            font-size: 0.85rem;
            transition: 0.1s;
            cursor: pointer;
        }
        .titlebar button:hover { background: #3c3c3c; color: white; }
        .titlebar .design-btn { background: #3ddc84; color: #1e1e1e; margin-left: auto; }
        .titlebar .design-btn:hover { background: #5fe0a0; }

        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        /* LEFT PANEL: XML EDITOR */
        .editor-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
            min-width: 300px;
            border-right: 1px solid #3c3c3c;
        }
        .tabs-row {
            display: flex;
            background: #2c2c2c;
            border-bottom: 1px solid #3c3c3c;
            height: 36px;
        }
        .tab {
            background: #1e1e1e;
            color: #ccc;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            border-right: 1px solid #3c3c3c;
            cursor: pointer;
        }
        .tab.active {
            background: #1e1e1e;
            color: #fff;
            border-bottom: 2px solid #3ddc84;
        }
        .tab .close-tab { margin-left: auto; font-size: 1.1rem; opacity: 0.5; }
        .tab .close-tab:hover { opacity: 1; color: #f85149; }
        #editor { flex: 1; width: 100%; font-size: 14px; }

        /* RIGHT PANEL: DESIGN PREVIEW (ALWAYS VISIBLE, LIKE STUDIO) */
        .design-panel {
            width: 45%;
            min-width: 320px;
            background: #2c2c2c;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #3c3c3c;
        }
        .design-header {
            background: #2c2c2c;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #aaa;
            font-size: 0.85rem;
        }
        .design-header i { color: #3ddc84; }
        .device-frame {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            padding: 20px;
        }
        .android-screen {
            width: 100%;
            max-width: 400px;
            height: 85%;
            background: #f0f0f0;  /* Light background like app canvas */
            border-radius: 36px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid #3c3c3c;
        }
        .status-bar {
            background: #2196F3;
            color: white;
            padding: 4px 12px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }
        .app-content {
            flex: 1;
            background: #f5f5f5;
            padding: 16px;
            overflow-y: auto;
            font-family: 'Roboto', sans-serif;
        }
        /* XML generated widgets will be injected here */
        .preview-widget {
            margin-bottom: 12px;
            width: 100%;
        }
        .preview-widget.button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-weight: 500;
            text-align: center;
        }
        .preview-widget.textview {
            color: #1e1e1e;
            font-size: 16px;
            padding: 8px 0;
        }
        .preview-widget.edittext {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 10px;
            background: white;
            color: #333;
        }
        .preview-widget.imageview {
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 24px;
            min-height: 60px;
            border-radius: 8px;
        }
        .preview-widget.linearlayout {
            border: 1px dashed #aaa;
            padding: 8px;
            margin-bottom: 12px;
        }
        .preview-widget.linearlayout.horizontal {
            display: flex;
            gap: 8px;
        }
        .attr-hint {
            color: #3ddc84;
            font-size: 11px;
            font-family: monospace;
        }
        .status-line {
            background: #2c2c2c;
            padding: 2px 12px;
            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid #3c3c3c;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="titlebar">
        <div class="brand"><i class="bi bi-phone"></i> layout·studio</div>
        <button onclick="ui.createNewFile()"><i class="bi bi-file-earmark-plus"></i> new layout</button>
        <button class="design-btn" onclick="ui.toggleDesignMode()"><i class="bi bi-palette"></i> design mode (always on)</button>
    </div>

    <div class="workspace">
        <!-- LEFT: EDITOR (XML) -->
        <div id="editorZone" class="editor-zone">
            <div class="tabs-row" id="tabsContainer">
                <div class="tab active">activity_main.xml <span class="close-tab" style="visibility:hidden;">&times;</span></div>
            </div>
            <div id="editor"></div>
            <div class="status-line">
                <span id="lintStatus"><i class="bi bi-check-circle-fill text-success"></i> xml ready</span>
                <span id="saveStatus">Android Studio style · live preview</span>
            </div>
        </div>

        <!-- RIGHT: DESIGN PREVIEW (always visible, like design mode) -->
        <div class="design-panel">
            <div class="design-header">
                <i class="bi bi-phone"></i> Pixel 4 · API 30
                <span style="margin-left:auto;"><i class="bi bi-arrow-repeat"></i> live update</span>
            </div>
            <div class="device-frame">
                <div class="android-screen">
                    <div class="status-bar">
                        <span>10:25</span>
                        <span><i class="bi bi-wifi"></i> <i class="bi bi-battery-full"></i></span>
                    </div>
                    <div id="androidContent" class="app-content">
                        <!-- widgets generated from XML will appear here -->
                        <div class="preview-widget textview" style="font-size:24px; font-weight:bold;">Hello, Android</div>
                        <div class="preview-widget button">CLICK ME</div>
                        <div class="preview-widget edittext" contenteditable="false">Type here...</div>
                    </div>
                </div>
            </div>
            <div class="status-line" style="border-top:1px solid #3c3c3c; border-left:none;">
                <span><i class="bi bi-layout-three-columns"></i> design mode</span>
                <span>XML → view sync</span>
            </div>
        </div>
    </div>

    <script>
        // ---------- ACE EDITOR SETUP ----------
        let editor;
        let previewTimeout;

        window.onload = () => {
            editor = ace.edit('editor');
            editor.setTheme('ace/theme/tomorrow_night');
            editor.session.setMode('ace/mode/xml');  // Android layouts are XML
            ace.require('ace/ext/language_tools');
            editor.setOptions({
                enableBasicAutocompletion: true,
                enableLiveAutocompletion: true,
                fontSize: '14px'
            });

            // Initial Android XML sample
            const initialXml = `<?xml version="1.0" encoding="utf-8"?>
<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent"
    android:layout_height="match_parent"
    android:orientation="vertical"
    android:padding="16dp">

    <TextView
        android:layout_width="wrap_content"
        android:layout_height="wrap_content"
        android:text="Welcome to Android Studio"
        android:textSize="24sp"
        android:textColor="#2196F3"
        android:layout_marginBottom="16dp"/>

    <EditText
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        android:hint="Enter your name"
        android:padding="12dp"
        android:background="#FFFFFF"
        android:layout_marginBottom="16dp"/>

    <Button
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        android:text="SAY HELLO"
        android:backgroundTint="#4CAF50"
        android:textColor="#FFFFFF"/>

    <ImageView
        android:layout_width="100dp"
        android:layout_height="100dp"
        android:layout_gravity="center_horizontal"
        android:src="@drawable/ic_launcher"
        android:layout_marginTop="24dp"
        android:background="#E0E0E0"
        android:scaleType="centerInside"/>

</LinearLayout>`;

            editor.setValue(initialXml, -1);
            
            // Trigger preview on any change (debounced)
            editor.session.on('change', () => {
                clearTimeout(previewTimeout);
                previewTimeout = setTimeout(() => {
                    updateAndroidPreview();
                }, 300);  // 300ms debounce feels responsive
            });

            // Initial preview
            updateAndroidPreview();
        };

        // ---------- LIVE XML → ANDROID PREVIEW ----------
        function updateAndroidPreview() {
            const xml = editor.getValue();
            const container = document.getElementById('androidContent');
            container.innerHTML = '';  // clear previous

            try {
                // Super simple XML parser (just for demo) – we manually parse some tags
                // In a real tool you'd use a proper parser, but this shows the concept.
                const lines = xml.split('\n');
                let currentLayout = null;
                let layoutStack = [];  // for nested layouts (simplified)
                
                // Very naive tag extraction – only for demo purposes.
                // It extracts tags like <TextView ... /> or <Button ... > ... </Button>
                const tagRegex = /<(\w+)([^>]*?)(\/?>|<\/\1>)/gs;
                let match;
                // We'll collect root views and approximate.
                // For simplicity we just find all self-closing or open tags and render.
                // This is NOT a full XML parser, just a demo to simulate Android Studio feel.
                
                // Reset container, then parse
                const tempDiv = document.createElement('div');
                let insideTag = false;
                let currentTagName = '';
                
                // Better approach: use DOMParser to parse XML (browser built-in)
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xml, 'text/xml');
                
                // Check for parsing errors
                const parseError = xmlDoc.getElementsByTagName('parsererror');
                if (parseError.length > 0) {
                    container.innerHTML = `<div style="color:#f85149; background:#2d2d2d; padding:12px; border-radius:8px;">
                        <i class="bi bi-exclamation-triangle-fill"></i> XML parsing error. Check syntax.
                    </div>`;
                    return;
                }
                
                // Recursive function to render Android views from XML nodes
                function renderNode(node, parentElement) {
                    if (node.nodeType === Node.TEXT_NODE) {
                        // Ignore whitespace
                        if (node.textContent.trim()) {
                            // For text inside like <TextView>some text</TextView>
                            const textSpan = document.createElement('span');
                            textSpan.className = 'preview-widget textview';
                            textSpan.style.padding = '4px 0';
                            textSpan.innerText = node.textContent.trim();
                            parentElement.appendChild(textSpan);
                        }
                        return;
                    }
                    
                    if (node.nodeType !== Node.ELEMENT_NODE) return;
                    
                    const tagName = node.tagName.toLowerCase();
                    const attrs = {};
                    for (let attr of node.attributes) {
                        attrs[attr.name] = attr.value;
                    }
                    
                    // Create preview element based on tag
                    let el;
                    if (tagName === 'textview') {
                        el = document.createElement('div');
                        el.className = 'preview-widget textview';
                        el.innerText = attrs['android:text'] || 'TextView';
                        if (attrs['android:textSize']) el.style.fontSize = attrs['android:textSize'];
                        if (attrs['android:textColor']) el.style.color = attrs['android:textColor'];
                        if (attrs['android:layout_marginBottom']) el.style.marginBottom = attrs['android:layout_marginBottom'];
                    }
                    else if (tagName === 'button') {
                        el = document.createElement('div');
                        el.className = 'preview-widget button';
                        el.innerText = attrs['android:text'] || 'Button';
                        if (attrs['android:backgroundTint']) el.style.background = attrs['android:backgroundTint'];
                        if (attrs['android:textColor']) el.style.color = attrs['android:textColor'];
                        if (attrs['android:layout_marginBottom']) el.style.marginBottom = attrs['android:layout_marginBottom'];
                    }
                    else if (tagName === 'edittext') {
                        el = document.createElement('div');
                        el.className = 'preview-widget edittext';
                        el.innerText = attrs['android:text'] || attrs['android:hint'] || 'EditText';
                        if (attrs['android:hint'] && !attrs['android:text']) {
                            el.style.color = '#aaa';
                            el.innerText = attrs['android:hint'];
                        }
                        if (attrs['android:background']) el.style.background = attrs['android:background'];
                    }
                    else if (tagName === 'imageview') {
                        el = document.createElement('div');
                        el.className = 'preview-widget imageview';
                        el.innerHTML = '🖼️ ' + (attrs['android:src'] || 'image');
                        if (attrs['android:layout_width'] === 'match_parent') el.style.width = '100%';
                        if (attrs['android:layout_height']) el.style.height = attrs['android:layout_height'];
                    }
                    else if (tagName === 'linearlayout') {
                        el = document.createElement('div');
                        el.className = 'preview-widget linearlayout';
                        if (attrs['android:orientation'] === 'horizontal') {
                            el.classList.add('horizontal');
                        }
                        if (attrs['android:padding']) el.style.padding = attrs['android:padding'];
                        if (attrs['android:layout_width'] === 'match_parent') el.style.width = '100%';
                    }
                    else {
                        // unknown tag – just a box
                        el = document.createElement('div');
                        el.className = 'preview-widget';
                        el.style.padding = '8px';
                        el.style.background = '#eaeaea';
                        el.style.color = '#888';
                        el.innerText = `<${tagName}> preview`;
                    }
                    
                    // Apply common layout attributes
                    if (attrs['android:layout_width'] === 'match_parent') el.style.width = '100%';
                    if (attrs['android:layout_height'] === 'match_parent') el.style.height = '100%';
                    if (attrs['android:layout_margin']) el.style.margin = attrs['android:layout_margin'];
                    if (attrs['android:layout_marginBottom']) el.style.marginBottom = attrs['android:layout_marginBottom'];
                    if (attrs['android:layout_marginTop']) el.style.marginTop = attrs['android:layout_marginTop'];
                    if (attrs['android:gravity'] === 'center') el.style.textAlign = 'center';
                    
                    parentElement.appendChild(el);
                    
                    // Process children recursively
                    for (let child of node.childNodes) {
                        renderNode(child, el);
                    }
                }
                
                // Start from root element
                const root = xmlDoc.documentElement;
                if (root) {
                    renderNode(root, container);
                } else {
                    container.innerHTML = '<div class="preview-widget textview">No root element</div>';
                }
                
                // Add a little note about live updates
                const note = document.createElement('div');
                note.style.marginTop = '12px';
                note.style.fontSize = '11px';
                note.style.color = '#3ddc84';
                note.style.textAlign = 'center';
                note.innerHTML = '<i class="bi bi-lightning-charge"></i> live design · type to update';
                container.appendChild(note);
                
            } catch (e) {
                container.innerHTML = `<div style="color:#f85149;">Error parsing XML: ${e.message}</div>`;
            }
        }

        // ---------- SIMPLE UI ACTIONS (to mimic studio) ----------
        const ui = {
            createNewFile() {
                const newLayout = `<?xml version="1.0" encoding="utf-8"?>
<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent"
    android:layout_height="match_parent"
    android:orientation="vertical"
    android:padding="16dp">

    <TextView
        android:layout_width="wrap_content"
        android:layout_height="wrap_content"
        android:text="New Layout"
        android:textSize="20sp"/>

</LinearLayout>`;
                editor.setValue(newLayout, -1);
                document.getElementById('saveStatus').innerText = 'new layout created';
                setTimeout(() => document.getElementById('saveStatus').innerText = 'Android Studio style · live preview', 2000);
            },
            
            toggleDesignMode() {
                // Design mode is always on, but we can simulate a toast
                document.getElementById('saveStatus').innerText = 'design mode always active';
                setTimeout(() => document.getElementById('saveStatus').innerText = 'Android Studio style · live preview', 1500);
            }
        };

        // Minor: update status on save shortcut (Ctrl+S)
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                document.getElementById('saveStatus').innerText = 'layout synced ✓';
                setTimeout(() => document.getElementById('saveStatus').innerText = 'Android Studio style · live preview', 1500);
            }
        });
    </script>
</body>
</html>
