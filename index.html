<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- ACE Editor -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ext-language_tools.js"></script>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Skulpt for Python -->
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>

<!-- SQL -->
<script src="https://cdn.jsdelivr.net/npm/alasql@4.3.1/alasql.min.js"></script>

<!-- Swahili Interpreter -->
<script src="swahili.js"></script>

<style>
/* Basic layout & colors */
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1e1e1e; color:#e6edf3; font-family:'Segoe UI', Roboto,sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
.titlebar { background:#2c2c2c; padding:.4rem 1rem; display:flex; align-items:center; gap:1rem; border-bottom:1px solid #3c3c3c; font-size:.9rem; }
.titlebar .brand { font-weight:600; color:#fff; } 
.titlebar .brand i { color:#61dafb; margin-right:6px; }
.titlebar button { background:transparent; border:none; color:#ccc; display:inline-flex; align-items:center; gap:6px; padding:.3rem .9rem; border-radius:6px; font-size:.85rem; cursor:pointer; transition:.1s; }
.titlebar button:hover { background:#3c3c3c; color:#fff; }
.titlebar .run-btn { background:#3ddc84; color:#1e1e1e; }
.titlebar .run-btn:hover { background:#5fe0a0; }

/* Workspace */
.workspace { display:flex; flex:1; overflow:hidden; }
.sidebar { width:250px; background:#252526; border-right:1px solid #3c3c3c; display:flex; flex-direction:column; }
.sidebar-header { padding:10px 16px; font-size:.75rem; color:#aaa; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #3c3c3c; }
.sidebar-header i { cursor:pointer; padding:4px; border-radius:4px; }
.sidebar-header i:hover { background:#3c3c3c; }
.file-tree { flex:1; overflow-y:auto; padding:8px 0; }
.tree-item { display:flex; align-items:center; padding:4px 8px; cursor:pointer; font-size:.9rem; color:#ccc; transition:.1s; }
.tree-item:hover { background:#2a2d2e; }
.tree-item.selected { background:#37373d; }
.folder-content { display:none; }
.folder-content.open { display:block; }
.folder-icon { color:#dcb67a; }
.file-icon { color:#8a8a8a; }
.file-icon.html { color:#e34c26; }
.file-icon.css { color:#264de4; }
.file-icon.js { color:#f7df1e; }
.file-icon.jsx { color:#61dafb; }
.file-icon.py { color:#3572A5; }
.file-icon.xml { color:#00b894; }
.file-icon.sql { color:#e48e00; }
.file-icon.ks { color:#ff6b6b; }

/* Editor */
.editor-zone { flex:1; display:flex; flex-direction:column; background:#1e1e1e; min-width:300px; }
.tabs-row { display:flex; background:#252526; height:36px; overflow-x:auto; }
.tab { background:#2d2d2d; color:#888; padding:0 1rem; display:flex; align-items:center; gap:10px; font-size:.85rem; border-right:1px solid #1e1e1e; cursor:pointer; white-space:nowrap; height:100%; }
.tab.active { background:#1e1e1e; color:#fff; border-top:2px solid #61dafb; }
.tab .close-tab { font-size:1rem; opacity:.5; margin-left:6px; }
.tab .close-tab:hover { opacity:1; color:#f85149; }
#editor { flex:1; width:100%; font-size:14px; }

/* Output */
.design-panel { width:40%; min-width:320px; background:#2c2c2c; display:flex; flex-direction:column; border-left:1px solid #3c3c3c; }
.design-header { background:#252526; padding:.5rem 1rem; border-bottom:1px solid #3c3c3c; color:#aaa; font-size:.85rem; display:flex; align-items:center; }
.visual-output { flex:1; background:white; border:none; width:100%; height:100%; }
.console-output { height:180px; background:#1e1e1e; border-top:2px solid #3c3c3c; padding:10px; font-family:'Consolas','Courier New',monospace; font-size:13px; color:#d4d4d4; overflow-y:auto; display:none; }
.console-line { margin-bottom:4px; }
.console-log { color:#d4d4d4; }
.console-error { color:#f85171; }
.console-info { color:#6a9955; }

/* Status */
.status-line { background:#007acc; padding:2px 12px; font-size:.8rem; color:#fff; border-top:1px solid #3c3c3c; display:flex; justify-content:space-between; }
</style>
</head>
<body>

<div class="titlebar">
    <div class="brand"><i class="bi bi-code-slash"></i> Code Studio</div>
    <button class="run-btn" onclick="runner.runCurrentFile()"><i class="bi bi-play-fill"></i> Run</button>
</div>

<div class="workspace">
    <div class="sidebar">
        <div class="sidebar-header">Explorer
            <i class="bi bi-plus-square" title="New File" onclick="fileTree.createNewFile()"></i>
        </div>
        <div class="file-tree" id="fileTreeContainer"></div>
    </div>

    <div class="editor-zone">
        <div class="tabs-row" id="tabsContainer"></div>
        <div id="editor"></div>
        <div class="status-line">
            <span id="langStatus">Ready</span>
            <span id="statusMsg">Ctrl+S to save</span>
        </div>
    </div>

    <div class="design-panel">
        <div class="design-header"><i class="bi bi-terminal" style="margin-right:8px;"></i> Output</div>
        <iframe id="previewFrame" class="visual-output" sandbox="allow-scripts allow-modals"></iframe>
        <div id="consoleOutput" class="console-output"></div>
    </div>
</div>

<script>
// ---------- STATE ----------
let editor;
const previewFrame = document.getElementById('previewFrame');
const consoleElement = document.getElementById('consoleOutput');

const uid = () => '_' + Math.random().toString(36).substr(2,9);

// ---------- FILE SYSTEM ----------
const fsData = {
    root:[
        { id: uid(), type:'folder', name:'src', expanded:true, children:[
            { id: uid(), type:'file', name:'index.html', content:'<h1>Hello World</h1>' },
            { id: uid(), type:'file', name:'app.ks', content:"$ jina = 'Code Studio';\nandika 'Karibu ', jina;" }
        ]}
    ]
};

const openTabs = [];
let activeFileId = null;

// ---------- FILE TREE ----------
const fileTree = {
    init() { this.render(); const first=this.findFirstFile(fsData.root); if(first) this.openFile(first.id); },
    findFirstFile(items){for(let i of items){if(i.type==='file')return i;if(i.type==='folder'){const f=this.findFirstFile(i.children); if(f)return f;}} return null;},
    render(){
        const container=document.getElementById('fileTreeContainer');
        container.innerHTML=this.renderItems(fsData.root,0);
        this.attachEvents();
    },
    renderItems(items,depth){
        let html=''; items.forEach(item=>{
            const indent=depth*16;
            const isActive=item.id===activeFileId?'selected':'';
            if(item.type==='folder'){
                const isOpen=item.expanded?'open':'';
                const icon=item.expanded?'bi-chevron-down':'bi-chevron-right';
                html+=`<div class="tree-item" data-id="${item.id}" data-type="folder" style="padding-left:${indent+8}px"><i class="bi ${icon}"></i> <i class="bi bi-folder-fill folder-icon"></i> ${item.name}</div>
                <div class="folder-content ${isOpen}" data-folder-id="${item.id}">${this.renderItems(item.children,depth+1)}</div>`;
            } else {
                const ext=item.name.split('.').pop();
                html+=`<div class="tree-item ${isActive}" data-id="${item.id}" data-type="file" style="padding-left:${indent+8}px"><i class="bi bi-file-earmark file-icon ${ext}"></i> ${item.name}</div>`;
            }
        });
        return html;
    },
    attachEvents(){
        const items=document.querySelectorAll('.tree-item');
        items.forEach(el=>{
            el.onclick=(e)=>{
                const id=el.dataset.id;
                if(el.dataset.type==='folder') this.toggleFolder(id); else this.openFile(id);
            };
        });
    },
    toggleFolder(id){
        const f=this.findItem(fsData.root,id);
        if(f&&f.type==='folder'){f.expanded=!f.expanded; this.render();}
    },
    findItem(items,id){for(let i of items){if(i.id===id)return i;if(i.type==='folder'){const f=this.findItem(i.children,id);if(f)return f;}} return null;},
    openFile(id){
        const f=this.findItem(fsData.root,id);
        if(!f||f.type!=='file') return;
        activeFileId=id;
        if(!openTabs.includes(id)) openTabs.push(id);
        editor.setValue(f.content,-1);
        const ext=f.name.split('.').pop();
        const modeMap={'html':'ace/mode/html','css':'ace/mode/css','js':'ace/mode/javascript','jsx':'ace/mode/jsx','py':'ace/mode/python','xml':'ace/mode/xml','sql':'ace/mode/sql','ks':'ace/mode/javascript'};
        editor.session.setMode(modeMap[ext]||'ace/mode/text');
        document.getElementById('langStatus').innerText=ext.toUpperCase();
        renderTabs();
    }
};

// ---------- TABS ----------
function renderTabs(){
    const container=document.getElementById('tabsContainer'); container.innerHTML='';
    openTabs.forEach(id=>{
        const f=fileTree.findItem(fsData.root,id); if(!f) return;
        const tab=document.createElement('div'); tab.className=`tab ${id===activeFileId?'active':''}`;
        const ext=f.name.split('.').pop(); const iconMap={'html':'bi-filetype-html','css':'bi-filetype-css','js':'bi-filetype-js','jsx':'bi-filetype-jsx','py':'bi-filetype-py','xml':'bi-file-earmark-code','sql':'bi-database','ks':'bi-file-earmark-code'};
        tab.innerHTML=`<i class="bi ${iconMap[ext]||'bi-file-earmark'}"></i> ${f.name} <span class="close-tab">&times;</span>`;
        tab.onclick=(e)=>{
            if(e.target.classList.contains('close-tab')){
                openTabs.splice(openTabs.indexOf(id),1);
                if(activeFileId===id && openTabs.length>0) fileTree.openFile(openTabs[openTabs.length-1]);
                else if(openTabs.length===0) {activeFileId=null; editor.setValue("",-1);}
                renderTabs();
            } else fileTree.openFile(id);
        };
        container.appendChild(tab);
    });
}

// ---------- RUNNER ----------
const runner = {
    runCurrentFile(){
        if(!activeFileId) return;
        const f=fileTree.findItem(fsData.root,activeFileId); if(!f) return;
        f.content=editor.getValue();
        const ext=f.name.split('.').pop();
        consoleElement.innerHTML=''; previewFrame.style.display='block'; consoleElement.style.display='none';
        const runners={'html':this.runHTML,'js':this.runJS,'ks':this.runSwahili};
        if(runners[ext]) runners[ext](f.content);
        else { consoleElement.style.display='block'; this.log('info',`Unsupported type: ${ext}`);}
    },
    runHTML(code){ previewFrame.srcdoc=code; },
    runJS(code){ consoleElement.style.display='block'; previewFrame.style.display='none';
        const customConsole={log:(...a)=>this.log('log',a.join(' ')), error:(...a)=>this.log('error',a.join(' '))};
        try{ new Function('console',code)(customConsole); } catch(e){ this.log('error',e.message);}
    },
    runSwahili(code){ consoleElement.style.display='block'; previewFrame.style.display='none';
        window.globalLog={values:[]}; try{ new Interpreter(code);
        window.globalLog.values.forEach(entry=>{ if(entry.log!==undefined) this.log('log',entry.log); if(entry.error) this.log('error',entry.error.message);});
        } catch(e){ this.log('error',e.message);}
    },
    log(type,msg){ const div=document.createElement('div'); div.className=`console-line console-${type}`; div.innerText=msg; consoleElement.appendChild(div); consoleElement.scrollTop=consoleElement.scrollHeight; }
};

// ---------- INIT ----------
window.onload=()=>{
    editor=ace.edit('editor'); editor.setTheme('ace/theme/tomorrow_night'); editor.setOptions({enableBasicAutocompletion:true,enableLiveAutocompletion:true,fontSize:'14px'});
    fileTree.init();
    editor.session.on('change',()=>{
        if(activeFileId) { const f=fileTree.findItem(fsData.root,activeFileId); if(f) f.content=editor.getValue(); }
    });
};
document.addEventListener('keydown',(e)=>{ if(e.ctrlKey && e.key==='s'){ e.preventDefault(); document.getElementById('statusMsg').innerText='Saved'; setTimeout(()=>document.getElementById('statusMsg').innerText='Ready',1500);}});
</script>
</body>
</html>
