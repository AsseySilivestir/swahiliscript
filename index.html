<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pure IDE · Kiswahili (KS) + all languages</title>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- ACE Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ext-language_tools.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ext-error_marker.js"></script>
    <!-- JSZip for download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- FileSaver for download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- Skulpt (Python) -->
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
    <!-- Babel & React -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- SQL.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <!-- Swahili Script - load from root folder -->
    <script src="swahili.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #e6edf3;
            overflow: hidden;
        }
        .titlebar {
            background: #161b22;
            padding: 0.4rem 1rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            border-bottom: 1px solid #30363d;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }
        .titlebar .brand {
            font-weight: 600;
            color: #f0f6fc;
            letter-spacing: 0.3px;
        }
        .titlebar .brand i { color: #2f81f7; margin-right: 6px; }
        .titlebar .brand .ks-badge {
            background: #8b5cf6;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 12px;
            margin-left: 8px;
        }
        .titlebar button {
            background: transparent;
            border: none;
            color: #e6edf3;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.3rem 0.9rem;
            border-radius: 6px;
            font-size: 0.85rem;
            transition: 0.1s;
            cursor: pointer;
        }
        .titlebar button:hover { background: #30363d; }
        .titlebar .run-btn {
            background: #238636;
            color: white;
            margin-left: auto;
        }
        .titlebar .run-btn:hover { background: #2ea043; }
        .titlebar .download-btn {
            background: #1f6feb;
            color: white;
        }
        .titlebar .download-btn:hover { background: #388bfd; }

        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .file-sidebar {
            width: 260px;
            background: #0d1117;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            font-size: 0.9rem;
            position: relative;
        }
        .sidebar-header {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #30363d;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #7d8590;
        }
        .sidebar-actions {
            display: flex;
            gap: 8px;
        }
        .sidebar-actions i { cursor: pointer; padding: 4px; border-radius: 4px; }
        .sidebar-actions i:hover { background: #30363d; color: white; }
        
        #fileTree {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0.5rem 0;
            min-height: 100px;
        }
        
        .tree-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px 4px 16px;
            cursor: grab;
            border-radius: 0 6px 6px 0;
            margin-right: 4px;
            white-space: nowrap;
            user-select: none;
            transition: background 0.1s;
        }
        .tree-item.dragging {
            opacity: 0.5;
            background: #1f6feb;
        }
        .tree-item.drag-over {
            background: #388bfd !important;
            border: 1px dashed #58a6ff;
        }
        .tree-item:hover { background: #30363d; }
        .tree-item.selected { background: #1f6feb; color: white; }
        .tree-item i { width: 18px; font-size: 0.95rem; color: #8b949e; }
        .tree-item.selected i { color: white; }
        .folder-chevron { font-size: 0.7rem; margin-right: 2px; }
        .tree-children { 
            display: none; 
            padding-left: 1.2rem;
            list-style: none;
        }
        .tree-children.open { display: block; }

        .editor-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d1117;
        }
        .tabs-row {
            display: flex;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            overflow-x: auto;
            height: 36px;
        }
        .tab {
            background: #21262d;
            color: #b1bac4;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            border-right: 1px solid #30363d;
            cursor: pointer;
            min-width: 100px;
            max-width: 140px;
        }
        .tab.active {
            background: #0d1117;
            color: #f0f6fc;
            border-bottom: 2px solid #1f6feb;
        }
        .tab .close-tab {
            margin-left: auto;
            font-size: 1.1rem;
            opacity: 0.5;
        }
        .tab .close-tab:hover { opacity: 1; color: #f85149; }
        #editor { flex: 1; width: 100%; font-size: 14px; }

        .output-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d1117;
        }
        .output-header {
            background: #161b22;
            padding: 0.3rem 1rem;
            border-bottom: 1px solid #30363d;
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
        }
        .output-header span { 
            cursor: pointer; 
            padding: 4px 0; 
            color: #8b949e;
            border-bottom: 2px solid transparent;
        }
        .output-header .active-tab {
            color: #f0f6fc;
            border-bottom: 2px solid #1f6feb;
        }
        .terminal {
            flex: 1;
            background: #0d1117;
            color: #e6edf3;
            font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
            padding: 1rem;
            overflow-y: auto;
            font-size: 0.9rem;
            white-space: pre-wrap;
        }
        .terminal .err { color: #f85149; }
        .terminal .info { color: #7ee227; }
        .terminal .line-error { 
            background: rgba(248,81,73,0.1); 
            border-left: 3px solid #f85149;
            padding-left: 8px;
            margin: 4px 0;
        }
        iframe { width: 100%; height: 100%; background: white; border: none; }

        .hidden { display: none !important; }

        .context-menu {
            position: fixed;
            background: #21262d;
            border: 1px solid #454c54;
            border-radius: 6px;
            padding: 0.3rem 0;
            display: none;
            z-index: 1000;
        }
        .context-item {
            padding: 0.4rem 1.5rem;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .context-item:hover { background: #1f6feb; color: white; }
        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            place-items: center;
            z-index: 2000;
        }
        .modal {
            background: #161b22;
            padding: 1.5rem;
            border-radius: 8px;
            width: 360px;
            border: 1px solid #3d444d;
        }
        .modal input {
            width: 100%;
            background: #0d1117;
            border: 1px solid #3d444d;
            padding: 0.6rem;
            color: white;
            margin: 1rem 0;
            border-radius: 4px;
        }
        .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
        .modal-actions button {
            padding: 0.4rem 1.2rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-primary { background: #238636; color: white; }
        .btn-primary:hover { background: #2ea043; }
        .status-line {
            background: #161b22;
            padding: 2px 12px;
            font-size: 0.8rem;
            color: #8b949e;
            border-top: 1px solid #30363d;
        }

        .upload-area {
            border: 2px dashed #30363d;
            border-radius: 6px;
            padding: 20px;
            text-align: center;
            margin: 10px;
            cursor: pointer;
            transition: border 0.2s;
        }
        .upload-area:hover {
            border-color: #1f6feb;
        }
        .upload-area i {
            font-size: 2rem;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="titlebar">
        <div class="brand"><i class="bi bi-cpu"></i> pure·ide <span class="ks-badge">Kiswahili (.ks)</span></div>
        <button onclick="ui.createNewFile()"><i class="bi bi-file-earmark-plus"></i> new file</button>
        <button onclick="ui.createNewFolder()"><i class="bi bi-folder-plus"></i> new folder</button>
        <button class="download-btn" onclick="ui.downloadProject()"><i class="bi bi-download"></i> download ZIP</button>
        <button class="run-btn" id="runButton" onclick="runner.runAndHideEditor()"><i class="bi bi-play-fill"></i> run → replace editor</button>
    </div>

    <div class="workspace">
        <div class="file-sidebar">
            <div class="sidebar-header">
                <span>EXPLORER</span>
                <div class="sidebar-actions">
                    <i class="bi bi-arrow-repeat" onclick="ui.refreshTree()" title="refresh"></i>
                    <i class="bi bi-upload" onclick="ui.uploadFile()" title="upload file"></i>
                </div>
            </div>
            <input type="file" id="fileUpload" multiple style="display: none;" onchange="ui.handleFileUpload(this.files)">
            <ul id="fileTree"></ul>
            <div class="upload-area" onclick="document.getElementById('fileUpload').click()">
                <i class="bi bi-cloud-upload"></i>
                <p>Drop files anywhere or click to upload</p>
            </div>
        </div>

        <div id="mainDynamicArea" style="flex:1; display: flex;">
            <div id="editorZone" class="editor-zone">
                <div class="tabs-row" id="tabsContainer"></div>
                <div id="editor"></div>
                <div class="status-line" id="lintStatus">
                    <i class="bi bi-check-circle-fill text-success"></i> ready
                </div>
            </div>
            <div id="outputZone" class="output-panel hidden">
                <div class="output-header">
                    <span id="terminalTabBtn" class="active-tab" onclick="ui.switchOutputTab('terminal')">terminal</span>
                    <span id="previewTabBtn" onclick="ui.switchOutputTab('preview')">web preview</span>
                </div>
                <div id="terminalPanel" class="terminal">ready · Kiswahili (KS) interpreter loaded</div>
                <iframe id="previewPanel" style="display: none;"></iframe>
            </div>
        </div>
    </div>

    <div id="contextMenu" class="context-menu">
        <div class="context-item" onclick="ui.createNewFile()"><i class="bi bi-file-earmark"></i> new file</div>
        <div class="context-item" onclick="ui.createNewFolder()"><i class="bi bi-folder-plus"></i> new folder</div>
        <div class="context-item" onclick="ui.renameItem()"><i class="bi bi-pencil"></i> rename</div>
        <div class="context-item" style="color:#f85149;" onclick="ui.deleteItem()"><i class="bi bi-trash3"></i> delete</div>
    </div>
    <div class="modal-bg" id="inputModal">
        <div class="modal">
            <h5 id="modalTitle">New file</h5>
            <input type="text" id="modalInput" placeholder="name.ext">
            <div class="modal-actions">
                <button onclick="ui.closeModal()">cancel</button>
                <button class="btn-primary" onclick="ui.modalConfirm()">ok</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== COMPREHENSIVE KISWAHILI (KS) LANGUAGE GUIDE ====================
        const ksGuide = {
            extension: '.ks',
            name: 'Kiswahili',
            keywords: {
                'andika': 'print/output',
                'kazi': 'function',
                'rudisha': 'return',
                'ikiwa': 'if',
                'au': 'else',
                'wakati': 'while',
                '$': 'variable prefix'
            },
            operators: {
                '+': 'jumlisha (addition)',
                '-': 'toa (subtraction)',
                '*': 'zidisha (multiplication)',
                '/': 'gawanya (division)',
                '%': 'modulo (remainder)',
                '=': 'weka thamani (assignment)',
                '==': 'sawa na (equal to)',
                '!=': 'si sawa (not equal)',
                '>': 'kubwa kuliko (greater than)',
                '<': 'ndogo kuliko (less than)',
                '>=': 'kubwa au sawa (greater or equal)',
                '<=': 'ndogo au sawa (less or equal)'
            },
            examples: {
                hello: 'andika("Salamu, Dunia!");',
                variables: '$jina = "Ahmed";\n$umri = 25;\nandika("Jina: " + jina);',
                math: '$a = 10;\n$b = 5;\n$jumla = a + b;\n$tofauti = a - b;\nandika("Jumla: " + jumla);',
                loop: '$i = 0;\nwakati (i < 5) {\n  andika("Namba: " + i);\n  i = i + 1;\n}',
                conditional: '$alama = 75;\nikiwa (alama >= 80) {\n  andika("Daraja A");\n} ikiwa (alama >= 60) {\n  andika("Daraja B");\n} au {\n  andika("Daraja C");\n}',
                function: 'kazi jumlisha:a,b: => {\n  $matokeo = a + b;\n  rudisha matokeo;\n}\n\n$jibu = jumlisha:10,20:;\nandika("Jibu: " + jibu);'
            }
        };

        // ==================== VIRTUAL FS with Kiswahili (.ks) examples ====================
        const fs = {
            structure: {
                // Kiswahili examples (.ks extension)
                'hello.ks': { type: 'file', content: `// Programu yako ya kwanza\nandika("Salamu, Dunia!");\nandika("Hujambo rafiki yangu!");` },
                'variables.ks': { type: 'file', content: `// Vigezo (Variables)\n$jina = "Ahmed";\n$umri = 25;\n$urefu = 1.75;\n\nandika("Jina: " + jina);\nandika("Umri: " + umri);\nandika("Urefu: " + urefu);` },
                'math.ks': { type: 'file', content: `// Hesabu (Math)\n$x = 10;\n$y = 20;\n\n$jumla = x + y;\n$tofauti = x - y;\n$zao = x * y;\n$mgawanyiko = x / y;\n$baki = x % y;\n\nandika("Jumla: " + jumla);\nandika("Tofauti: " + tofauti);\nandika("Zao: " + zao);\nandika("Mgawanyiko: " + mgawanyiko);\nandika("Baki: " + baki);` },
                'loop.ks': { type: 'file', content: `// Mzunguko (Loop)\n$i = 0;\nwakati (i < 5) {\n  andika("Namba: " + i);\n  i = i + 1;\n}\n\n// Mfano mwingine\n$j = 5;\nwakati (j > 0) {\n  andika("Kupungua: " + j);\n  j = j - 1;\n}` },
                'conditional.ks': { type: 'file', content: `// Masharti (Conditionals)\n$alama = 85;\n\nikiwa (alama >= 80) {\n  andika("Daraja: A - Vizuri sana!");\n} ikiwa (alama >= 60) {\n  andika("Daraja: B - Nzuri");\n} ikiwa (alama >= 40) {\n  andika("Daraja: C - Wasatii");\n} au {\n  andika("Daraja: D - Jaribu tena");\n}\n\n// Mfano wa umri\n$umri = 18;\nikiwa (umri >= 18) {\n  andika("Unaweza kupiga kura");\n} au {\n  andika("Bado ni mtoto");\n}` },
                'function.ks': { type: 'file', content: `// Kazi (Functions)\nkazi jumlisha:a,b: => {\n  $matokeo = a + b;\n  rudisha matokeo;\n}\n\nkazi zidisha:a,b: => {\n  $matokeo = a * b;\n  rudisha matokeo;\n}\n\nkazi salamu:jina: => {\n  andika("Habari " + jina + "!");\n}\n\n// Tumia kazi\n$n1 = 15;\n$n2 = 25;\n$jibu1 = jumlisha:n1,n2:;\n$jibu2 = zidisha:n1,n2:;\n\nandika("Jumla: " + jibu1);\nandika("Zao: " + jibu2);\nsalamu:"Ali":;` },
                'fizzbuzz.ks': { type: 'file', content: `// FizzBuzz kwa Kiswahili\n$i = 1;\nwakati (i <= 20) {\n  ikiwa (i % 15 == 0) {\n    andika("FizzBuzz");\n  } ikiwa (i % 3 == 0) {\n    andika("Fizz");\n  } ikiwa (i % 5 == 0) {\n    andika("Buzz");\n  } au {\n    andika(i);\n  }\n  i = i + 1;\n}` },
                'fibonacci.ks': { type: 'file', content: `// Fibonacci kwa Kiswahili\nkazi fibonacci:n: => {\n  $a = 0;\n  $b = 1;\n  $i = 0;\n  \n  wakati (i < n) {\n    andika(a);\n    $next = a + b;\n    a = b;\n    b = next;\n    i = i + 1;\n  }\n}\n\nandika("Namba 10 za kwanza za Fibonacci:");\nfibonacci:10:;` },
                
                // Regular files
                'index.html': { type: 'file', content: '<!DOCTYPE html>\n<html>\n<head><link rel="stylesheet" href="style.css"></head>\n<body>\n  <h1>hello world</h1>\n  <button onclick="app.hello()">click</button>\n  <script src="script.js"><\/script>\n</body>\n</html>' },
                'style.css': { type: 'file', content: 'body { background: #0d1117; color: #c9d1d9; }\nbutton { background: #238636; }' },
                'script.js': { type: 'file', content: 'const app = { hello: () => alert("from js!") };\nconsole.log("ready");' },
                'main.py': { type: 'file', content: 'def greet(name):\n    print("hello", name)\n\ngreet("world")\nfor i in range(3):\n    print(f"count {i}")' },
                'App.jsx': { type: 'file', content: 'function App() { const [c, setC] = React.useState(0); return <div><h1>react {c}</h1><button onClick={()=>setC(c+1)}>inc</button></div>; }\nReactDOM.render(<App />, document.getElementById("root"));' },
                'data.sql': { type: 'file', content: 'CREATE TABLE users(name TEXT);\nINSERT INTO users VALUES ("alice"), ("bob");\nSELECT * FROM users;' },
                'README.md': { type: 'file', content: '# Kiswahili Programming Language (.ks)\n\n## Keywords:\n- andika() - output/print\n- kazi - function\n- rudisha - return\n- ikiwa - if\n- au - else\n- wakati - while\n- $ - variable prefix\n\n## Example:\n```\nandika("Salamu, Dunia!");\n```' },
                'lib': { type: 'folder', children: {} },
                'projects': { type: 'folder', children: {} }
            },
            
            getNode(pathArr) {
                let cur = this.structure;
                for (let i = 0; i < pathArr.length; i++) {
                    if (!cur[pathArr[i]]) return null;
                    if (i === pathArr.length - 1) return cur[pathArr[i]];
                    cur = cur[pathArr[i]].children;
                }
                return cur;
            },
            
            saveFile(pathStr, content) {
                const parts = pathStr.split('/');
                const name = parts.pop();
                let parent = this.structure;
                parts.forEach(p => parent = parent[p].children);
                if (parent[name]) parent[name].content = content;
            },
            
            moveItem(oldPath, newParentPath) {
                const oldParts = oldPath.split('/');
                const name = oldParts.pop();
                let oldParent = this.structure;
                oldParts.forEach(p => oldParent = oldParent[p].children);
                
                const item = oldParent[name];
                if (!item) return false;
                
                delete oldParent[name];
                
                let newParent = this.structure;
                if (newParentPath) {
                    const newParts = newParentPath.split('/');
                    newParts.forEach(p => newParent = newParent[p].children);
                }
                newParent[name] = item;
                
                state.openTabs = state.openTabs.map(tab => {
                    if (tab === oldPath) return newParentPath ? `${newParentPath}/${name}` : name;
                    if (tab.startsWith(oldPath + '/')) {
                        return tab.replace(oldPath, newParentPath ? `${newParentPath}/${name}` : name);
                    }
                    return tab;
                });
                if (state.activeFile === oldPath) {
                    state.activeFile = newParentPath ? `${newParentPath}/${name}` : name;
                }
                
                return true;
            }
        };

        const state = {
            openTabs: ['hello.ks'],
            activeFile: 'hello.ks',
            db: null,
            annotations: [],
            dragSource: null
        };

        let editor;

        window.onload = () => {
            editor = ace.edit('editor');
            editor.setTheme('ace/theme/tomorrow_night');
            editor.session.setMode('ace/mode/javascript');
            ace.require('ace/ext/language_tools');
            editor.setOptions({
                enableBasicAutocompletion: true,
                enableLiveAutocompletion: true,
                enableSnippets: true,
                fontSize: '14px'
            });

            editor.session.on('changeAnnotation', function() {
                const annotations = editor.session.getAnnotations();
                state.annotations = annotations;
                updateLintStatus(annotations);
            });

            ui.refreshTree();
            ui.openFile('hello.ks', 'hello.ks');
            
            setupDragAndDrop();
            
            // Check if Swahili script loaded
            setTimeout(() => {
                if (typeof Interpreter !== 'undefined' && typeof Zap !== 'undefined') {
                    runner.log('✓ Kiswahili (KS) interpreter loaded successfully!', false, true);
                    runner.log('  Try running hello.ks or other .ks files', false, true);
                    runner.log('  Keywords: andika(), kazi, rudisha, ikiwa, au, wakati', false, true);
                } else {
                    runner.log('⚠ Kiswahili interpreter not found - make sure swahili.js is in the root folder', true);
                }
            }, 500);
        };

        function setupDragAndDrop() {
            document.addEventListener('dragover', (e) => {
                e.preventDefault();
            });
            
            document.addEventListener('drop', (e) => {
                e.preventDefault();
                if (e.dataTransfer.files.length > 0) {
                    ui.handleFileUpload(e.dataTransfer.files);
                }
            });
        }

        function updateLintStatus(ann) {
            const el = document.getElementById('lintStatus');
            const errors = ann.filter(a => a.type === 'error');
            const warnings = ann.filter(a => a.type === 'warning');
            if (errors.length) {
                el.innerHTML = `<i class="bi bi-x-circle-fill text-danger"></i> ${errors.length} error(s) · line ${errors[0].row + 1}`;
            } else if (warnings.length) {
                el.innerHTML = `<i class="bi bi-exclamation-triangle-fill text-warning"></i> ${warnings.length} warning(s)`;
            } else {
                el.innerHTML = `<i class="bi bi-check-circle-fill text-success"></i> no errors`;
            }
        }

        const ui = {
            refreshTree() {
                const container = document.getElementById('fileTree');
                container.innerHTML = '';
                this.renderLevel(fs.structure, container, '');
            },
            
            renderLevel(node, parentEl, pathPrefix) {
                Object.keys(node).sort((a,b) => {
                    if (node[a].type !== node[b].type) return node[a].type === 'folder' ? -1 : 1;
                    return a.localeCompare(b);
                }).forEach(name => {
                    const item = node[name];
                    const fullPath = pathPrefix ? pathPrefix + '/' + name : name;
                    const li = document.createElement('li');
                    
                    if (item.type === 'folder') {
                        li.innerHTML = `<div class="tree-item" data-path="${fullPath}" data-type="folder" style="padding-left: ${pathPrefix.split('/').filter(Boolean).length * 14}px" draggable="true">
                            <i class="bi bi-chevron-down folder-chevron"></i>
                            <i class="bi bi-folder-fill" style="color:#7d8590;"></i> ${name}
                        </div><ul class="tree-children open" data-parent="${fullPath}"></ul>`;
                        
                        const childUl = li.querySelector('ul');
                        this.renderLevel(item.children, childUl, fullPath);
                        
                        const div = li.querySelector('.tree-item');
                        div.onclick = (e) => {
                            e.stopPropagation();
                            const chev = div.querySelector('.bi-chevron-down');
                            childUl.classList.toggle('open');
                            chev.style.transform = childUl.classList.contains('open') ? 'rotate(0deg)' : 'rotate(-90deg)';
                        };
                        
                        div.ondragover = (e) => {
                            e.preventDefault();
                            div.classList.add('drag-over');
                        };
                        div.ondragleave = () => {
                            div.classList.remove('drag-over');
                        };
                        div.ondrop = (e) => {
                            e.preventDefault();
                            div.classList.remove('drag-over');
                            const sourcePath = e.dataTransfer.getData('text/plain');
                            if (sourcePath && sourcePath !== fullPath) {
                                if (confirm(`Move "${sourcePath}" to "${fullPath}"?`)) {
                                    if (fs.moveItem(sourcePath, fullPath)) {
                                        this.refreshTree();
                                        this.refreshTabs();
                                    }
                                }
                            }
                        };
                        
                        div.ondragstart = (e) => {
                            e.dataTransfer.setData('text/plain', fullPath);
                            div.classList.add('dragging');
                        };
                        div.ondragend = () => {
                            div.classList.remove('dragging');
                        };
                        
                    } else {
                        li.innerHTML = `<div class="tree-item" data-path="${fullPath}" data-type="file" style="padding-left: ${pathPrefix.split('/').filter(Boolean).length * 14 + 20}px" draggable="true">
                            <i class="${this.iconFor(name)}"></i> ${name}
                        </div>`;
                        
                        const div = li.querySelector('.tree-item');
                        div.onclick = () => this.openFile(fullPath, name);
                        
                        div.ondragstart = (e) => {
                            e.dataTransfer.setData('text/plain', fullPath);
                            div.classList.add('dragging');
                        };
                        div.ondragend = () => {
                            div.classList.remove('dragging');
                        };
                    }
                    
                    li.querySelector('.tree-item').oncontextmenu = (e) => {
                        e.preventDefault();
                        this.showContextMenu(e, fullPath, item.type);
                    };
                    
                    parentEl.appendChild(li);
                });
            },
            
            iconFor(name) {
                if (name.endsWith('.ks')) return 'bi bi-file-text-fill text-warning'; // Kiswahili files
                if (name.endsWith('.html')) return 'bi bi-filetype-html';
                if (name.endsWith('.css')) return 'bi bi-filetype-css';
                if (name.endsWith('.js')) return 'bi bi-filetype-js';
                if (name.endsWith('.jsx')) return 'bi bi-filetype-jsx';
                if (name.endsWith('.py')) return 'bi bi-filetype-py';
                if (name.endsWith('.sql')) return 'bi bi-database';
                if (name.endsWith('.json')) return 'bi bi-filetype-json';
                if (name.endsWith('.md')) return 'bi bi-markdown';
                return 'bi bi-file-earmark';
            },
            
            openFile(path, name) {
                document.getElementById('editorZone').classList.remove('hidden');
                document.getElementById('outputZone').classList.add('hidden');

                if (!state.openTabs.includes(path)) state.openTabs.push(path);
                state.activeFile = path;
                const node = fs.getNode(path.split('/'));
                if (node) {
                    editor.setValue(node.content, -1);
                    const ext = name.split('.').pop();
                    if (ext === 'ks') {
                        editor.session.setMode('ace/mode/javascript');
                    } else {
                        editor.session.setMode(this.aceMode(name));
                    }
                    editor.session.clearAnnotations();
                    this.highlightActive(path);
                    this.refreshTabs();
                }
            },
            
            aceMode(name) {
                const ext = name.split('.').pop();
                return { 
                    html:'ace/mode/html', 
                    css:'ace/mode/css', 
                    js:'ace/mode/javascript', 
                    jsx:'ace/mode/jsx', 
                    py:'ace/mode/python', 
                    sql:'ace/mode/sql',
                    json:'ace/mode/json',
                    md:'ace/mode/markdown'
                }[ext] || 'ace/mode/text';
            },
            
            refreshTabs() {
                const cont = document.getElementById('tabsContainer');
                cont.innerHTML = '';
                state.openTabs.forEach(p => {
                    const name = p.split('/').pop();
                    const active = p === state.activeFile ? 'active' : '';
                    const tab = document.createElement('div');
                    tab.className = `tab ${active}`;
                    tab.innerHTML = `${name} <span class="close-tab" onclick="event.stopPropagation(); ui.closeTab('${p}')">&times;</span>`;
                    tab.onclick = () => this.openFile(p, name);
                    cont.appendChild(tab);
                });
            },
            
            closeTab(path) {
                state.openTabs = state.openTabs.filter(p => p !== path);
                if (state.activeFile === path) {
                    state.activeFile = state.openTabs[0] || null;
                    if (state.activeFile) {
                        const node = fs.getNode(state.activeFile.split('/'));
                        editor.setValue(node.content, -1);
                    } else editor.setValue('');
                }
                this.refreshTabs();
            },
            
            highlightActive(path) {
                document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('selected'));
                const sel = document.querySelector(`.tree-item[data-path="${path}"]`);
                if (sel) sel.classList.add('selected');
            },
            
            showContextMenu(e, path, type) {
                const menu = document.getElementById('contextMenu');
                menu.style.left = e.pageX + 'px';
                menu.style.top = e.pageY + 'px';
                menu.style.display = 'block';
                menu.dataset.path = path;
                menu.dataset.type = type;
            },
            
            handleFileUpload(files) {
                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const content = e.target.result;
                        fs.structure[file.name] = { type: 'file', content: content };
                        this.refreshTree();
                        runner.log(`Uploaded: ${file.name}`, false, true);
                        
                        if (file.name === 'swahili.js') {
                            runner.log('Note: swahili.js loaded - refresh page to use KS interpreter', false, true);
                        }
                    };
                    reader.readAsText(file);
                });
            },
            
            uploadFile() {
                document.getElementById('fileUpload').click();
            },
            
            async downloadProject() {
                const zip = new JSZip();
                
                function addToZip(node, currentPath, zipFolder) {
                    Object.keys(node).forEach(name => {
                        const item = node[name];
                        if (item.type === 'folder') {
                            const newFolder = zipFolder.folder(name);
                            addToZip(item.children, currentPath ? `${currentPath}/${name}` : name, newFolder);
                        } else {
                            zipFolder.file(name, item.content);
                        }
                    });
                }
                
                addToZip(fs.structure, '', zip);
                
                const content = await zip.generateAsync({ type: 'blob' });
                saveAs(content, 'project.zip');
                runner.log('Project downloaded as project.zip', false, true);
            },
            
            createNewFile() { 
                this.modalPurpose = 'file'; 
                this.openModal('new file', 'filename.ks (or .html, .py, etc.)'); 
            },
            
            createNewFolder() { 
                this.modalPurpose = 'folder'; 
                this.openModal('new folder', 'folder name'); 
            },
            
            renameItem() {
                this.modalPurpose = 'rename';
                const oldPath = document.getElementById('contextMenu').dataset.path;
                if (!oldPath) return;
                this.renameOldPath = oldPath;
                this.openModal('rename', oldPath.split('/').pop());
            },
            
            deleteItem() {
                const path = document.getElementById('contextMenu').dataset.path;
                if (!path || !confirm(`delete ${path}?`)) return;
                const parts = path.split('/');
                const name = parts.pop();
                let parent = fs.structure;
                parts.forEach(p => parent = parent[p].children);
                delete parent[name];
                if (state.openTabs.includes(path)) this.closeTab(path);
                this.refreshTree();
            },
            
            modalConfirm() {
                const val = document.getElementById('modalInput').value.trim();
                if (!val) return;
                const ctxPath = document.getElementById('contextMenu').dataset.path;
                const ctxType = document.getElementById('contextMenu').dataset.type;

                if (this.modalPurpose === 'file' || this.modalPurpose === 'folder') {
                    let target = fs.structure;
                    if (ctxPath) {
                        if (ctxType === 'folder') target = fs.getNode(ctxPath.split('/')).children;
                        else {
                            const p = ctxPath.split('/');
                            p.pop();
                            if (p.length) target = fs.getNode(p).children;
                        }
                    }
                    target[val] = this.modalPurpose === 'file' ? 
                        { type:'file', content:'' } : 
                        { type:'folder', children:{} };
                } else if (this.modalPurpose === 'rename') {
                    const old = this.renameOldPath;
                    const parts = old.split('/');
                    const oldName = parts.pop();
                    let parent = fs.structure;
                    parts.forEach(p => parent = parent[p].children);
                    parent[val] = parent[oldName];
                    delete parent[oldName];
                    const newPath = parts.concat([val]).join('/');
                    if (state.openTabs.includes(old)) {
                        state.openTabs = state.openTabs.map(p => p === old ? newPath : p);
                        if (state.activeFile === old) state.activeFile = newPath;
                    }
                }
                this.refreshTree();
                this.closeModal();
            },
            
            openModal(title, placeholder) {
                document.getElementById('modalTitle').innerText = title;
                document.getElementById('modalInput').placeholder = placeholder;
                document.getElementById('modalInput').value = '';
                document.getElementById('inputModal').style.display = 'flex';
                document.getElementById('contextMenu').style.display = 'none';
            },
            
            closeModal() { 
                document.getElementById('inputModal').style.display = 'none'; 
            },
            
            switchOutputTab(tab) {
                const term = document.getElementById('terminalPanel');
                const prev = document.getElementById('previewPanel');
                if (tab === 'terminal') {
                    term.style.display = 'block';
                    prev.style.display = 'none';
                    document.getElementById('terminalTabBtn').classList.add('active-tab');
                    document.getElementById('previewTabBtn').classList.remove('active-tab');
                } else {
                    term.style.display = 'none';
                    prev.style.display = 'flex';
                    document.getElementById('previewTabBtn').classList.add('active-tab');
                    document.getElementById('previewTabBtn').classList.remove('active-tab');
                }
            }
        };

        // ==================== Define Zap class (matches your Node.js version) ====================
        class Zap {
            constructor(input) {
                this.input = input;
                try {
                    this.interpreter = new Interpreter(this.input);
                } catch (e) {
                    runner.log(`KS Error: ${e.message}`, true);
                }
            }
        }

        // ==================== RUNNER with Kiswahili (KS) support ====================
        const runner = {
            async runAndHideEditor() {
                if (state.activeFile) {
                    fs.saveFile(state.activeFile, editor.getValue());
                }
                document.getElementById('editorZone').classList.add('hidden');
                document.getElementById('outputZone').classList.remove('hidden');
                
                if (!state.activeFile) {
                    this.log('no file open', false, true);
                    return;
                }
                
                const ext = state.activeFile.split('.').pop();
                const node = fs.getNode(state.activeFile.split('/'));
                if (!node) return;

                document.getElementById('terminalPanel').innerHTML = '';
                ui.switchOutputTab('terminal');

                try {
                    if (ext === 'ks') {
                        await this.runKiswahili(node.content);
                    } else if (ext === 'html' || ext === 'css' || ext === 'js') {
                        this.runWeb();
                    } else if (ext === 'jsx') {
                        this.runReact();
                    } else if (ext === 'py') {
                        await this.runPython(node.content);
                    } else if (ext === 'sql') {
                        await this.runSQL(node.content);
                    } else {
                        this.log(`cannot run .${ext} files`, true);
                    }
                } catch (e) {
                    this.log(`Runtime error: ${e.message}`, true);
                }

                if (state.annotations.length) {
                    this.log('--- editor diagnostics ---', false, true);
                    state.annotations.forEach(a => {
                        const line = a.row + 1;
                        this.log(`line ${line}: ${a.type} - ${a.text}`, a.type === 'error');
                    });
                }
            },

            async runKiswahili(code) {
                this.log('⚡ Running Kiswahili (KS) script...', false, true);
                
                if (typeof Interpreter === 'undefined') {
                    this.log('❌ Error: Kiswahili interpreter not found!', true);
                    this.log('   Make sure swahili.js is in the root folder', false, true);
                    return;
                }

                try {
                    // Capture console.log output
                    const originalLog = console.log;
                    const outputs = [];
                    
                    console.log = (...args) => {
                        const msg = args.join(' ');
                        outputs.push(msg);
                        this.log(msg);
                    };
                    
                    // Create and run Zap instance
                    const zap = new Zap(code);
                    
                    // Restore console.log
                    console.log = originalLog;
                    
                    if (outputs.length === 0) {
                        this.log('✓ KS script executed (no output)', false, true);
                    } else {
                        this.log('✓ KS script completed', false, true);
                    }
                    
                } catch (e) {
                    this.log(`KS error: ${e.message}`, true);
                    const lineMatch = e.message.match(/line (\d+)/i);
                    if (lineMatch) {
                        this.log(`  at line ${lineMatch[1]}`, true);
                    }
                }
            },

            runWeb() {
                let htmlPath = state.activeFile;
                if (!htmlPath.endsWith('.html')) htmlPath = 'index.html';
                const node = fs.getNode(htmlPath.split('/'));
                if (!node) { this.log('index.html missing', true); return; }
                let html = node.content;
                html = html.replace(/<link[^>]*href=["']([\w\.\/]+\.css)["'][^>]*>/gi, (match, p1) => {
                    const cssNode = fs.getNode(p1.split('/'));
                    return cssNode ? `<style>/* ${p1} */\n${cssNode.content}</style>` : match;
                });
                html = html.replace(/<script[^>]*src=["']([\w\.\/]+\.js)["'][^>]*><\/script>/gi, (match, p1) => {
                    const jsNode = fs.getNode(p1.split('/'));
                    return jsNode ? `<script>/* ${p1} */\n${jsNode.content}<\/script>` : match;
                });
                document.getElementById('previewPanel').srcdoc = html;
                ui.switchOutputTab('preview');
            },

            runReact() {
                const node = fs.getNode(state.activeFile.split('/'));
                const jsx = node.content;
                const doc = `
                    <div id="root"></div>
                    <script src="https://unpkg.com/react@18/umd/react.development.js"><\/script>
                    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"><\/script>
                    <script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>
                    <script type="text/babel">${jsx}<\/script>
                `;
                document.getElementById('previewPanel').srcdoc = doc;
                ui.switchOutputTab('preview');
            },

            runPython(code) {
                return new Promise((resolve, reject) => {
                    Sk.configure({ 
                        output: (t) => this.log(t),
                        read: (x) => { if (Sk.builtinFiles && Sk.builtinFiles.files[x]) return Sk.builtinFiles.files[x]; throw 'file not found'; },
                        __future__: Sk.python3,
                        python3: true
                    });
                    Sk.misceval.asyncToPromise(() => Sk.importMainWithBody('<stdin>', false, code, true))
                        .then(resolve)
                        .catch(err => {
                            const msg = err.toString();
                            const lineMatch = msg.match(/line (\d+)/i);
                            if (lineMatch) {
                                this.log(`Python error at line ${lineMatch[1]}: ${msg}`, true);
                            } else {
                                this.log(`Python error: ${msg}`, true);
                            }
                            reject(err);
                        });
                });
            },

            async runSQL(sql) {
                if (!state.db) {
                    const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${f}` });
                    state.db = new SQL.Database();
                }
                try {
                    const res = state.db.exec(sql);
                    if (!res.length) this.log('done (no rows)', false, true);
                    else {
                        res.forEach(r => {
                            let table = '<table border="1" style="border-collapse:collapse; margin:4px 0"><tr>' + r.columns.map(c => `<th>${c}</th>`).join('') + '</tr>';
                            r.values.forEach(v => table += '<tr>' + v.map(d => `<td>${d}</td>`).join('') + '</tr>');
                            table += '</table>';
                            document.getElementById('terminalPanel').innerHTML += table;
                        });
                    }
                } catch (e) {
                    const lineMatch = e.message.match(/near line (\d+)/i);
                    if (lineMatch) {
                        this.log(`SQL error at line ${lineMatch[1]}: ${e.message}`, true);
                    } else {
                        this.log('sql err: '+e.message, true);
                    }
                }
            },

            log(msg, isErr, isInfo) {
                const el = document.getElementById('terminalPanel');
                const d = document.createElement('div');
                d.innerText = msg;
                if (isErr) d.className = 'err';
                else if (isInfo) d.className = 'info';
                if (msg.includes('line')) d.classList.add('line-error');
                el.appendChild(d);
                el.scrollTop = el.scrollHeight;
            }
        };

        document.addEventListener('click', () => document.getElementById('contextMenu').style.display = 'none');
    </script>
</body>
