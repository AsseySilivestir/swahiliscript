<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pure·ide · stable build</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ext-language_tools.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>

<style>
body { margin:0; background:#0d1117; color:#e6edf3; font-family:sans-serif; display:flex; flex-direction:column; height:100vh; }
.titlebar { display:flex; gap:10px; padding:10px; background:#161b22; }
button { cursor:pointer; }
.workspace { display:flex; flex:1; }
.sidebar { width:220px; border-right:1px solid #30363d; padding:10px; }
#editor { flex:1; height:100%; }
.output { width:50%; display:none; flex-direction:column; border-left:1px solid #30363d; }
body.split .output { display:flex; }
.terminal { flex:1; padding:10px; font-family:monospace; overflow:auto; }
iframe { flex:1; border:none; background:white; }
</style>
</head>

<body>

<div class="titlebar">
<button onclick="ui.newFile()">New</button>
<button onclick="ui.toggleSplit()">Split</button>
<button onclick="runner.run()">Run</button>
</div>

<div class="workspace">
<div class="sidebar" id="fileList"></div>
<div id="editor"></div>
<div class="output">
<div>
<button onclick="ui.showTab('terminal')">Terminal</button>
<button onclick="ui.showTab('preview')">Preview</button>
</div>
<div id="terminal" class="terminal"></div>
<iframe id="preview"></iframe>
</div>
</div>

<script>
// GLOBAL ERROR HANDLER
window.onerror = function(msg, url, line) {
    document.getElementById('terminal').innerHTML += 
        "JS Error: " + msg + " (line " + line + ")<br>";
};

// FILE SYSTEM
const fs = {
    files: {
        "index.html": "<h1>Hello</h1><script src='app.js'><\/script>",
        "app.js": "console.log('JS running');",
        "main.py": "print('Hello Python')"
    }
};

const state = { active: "index.html" };

// ACE
const editor = ace.edit("editor");
editor.setTheme("ace/theme/twilight");
editor.session.setMode("ace/mode/html");

// UI
const ui = {
    refresh() {
        const list = document.getElementById("fileList");
        list.innerHTML = "";
        Object.keys(fs.files).forEach(f => {
            const div = document.createElement("div");
            div.innerText = f;
            div.onclick = () => this.open(f);
            list.appendChild(div);
        });
    },

    open(f) {
        state.active = f;
        editor.setValue(fs.files[f], -1);

        if (f.endsWith(".js")) editor.session.setMode("ace/mode/javascript");
        else if (f.endsWith(".py")) editor.session.setMode("ace/mode/python");
        else editor.session.setMode("ace/mode/html");
    },

    newFile() {
        const name = prompt("filename");
        if (!name) return;
        fs.files[name] = "";
        this.refresh();
    },

    toggleSplit() {
        document.body.classList.toggle("split");
    },

    showTab(tab) {
        document.getElementById("terminal").style.display = tab === "terminal" ? "block" : "none";
        document.getElementById("preview").style.display = tab === "preview" ? "block" : "none";
    }
};

// RUNNER
const runner = {
    run() {
        if (!state.active) return;

        fs.files[state.active] = editor.getValue();

        const ext = state.active.split(".").pop();

        if (ext === "html" || ext === "js") this.runWeb();
        else if (ext === "py") this.runPython(fs.files[state.active]);
    },

    runWeb() {
        let html = fs.files["index.html"] || "";

        html = html.replace(/<script src="(.+?)"><\/script>/g, (m, p1) => {
            return "<script>" + (fs.files[p1] || "") + "<\/script>";
        });

        html = `
        <!DOCTYPE html>
        <html>
        <body>${html}</body>
        </html>
        `;

        document.getElementById("preview").srcdoc = html;
        ui.showTab("preview");
    },

    runPython(code) {
        const term = document.getElementById("terminal");
        term.innerHTML = "";

        Sk.configure({
            output: (t) => term.innerHTML += t.replace(/\n/g,"<br>"),
            read: (x) => Sk.builtinFiles.files[x] || null
        });

        Sk.misceval.asyncToPromise(() =>
            Sk.importMainWithBody("<stdin>", false, code, true)
        ).catch(e => {
            term.innerHTML += "Error: " + e;
        });

        ui.showTab("terminal");
    }
};

// INIT
ui.refresh();
ui.open("index.html");

</script>
</body>
</html>
